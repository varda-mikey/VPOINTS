  };
})();
/* ================= END V22 SAFE FORMS + TRAINING PASS FEED PATCH ================= */



/* ================= V23 TRAINING VIEWER + QUIZ FLOW FIX =================
   Fixes requested:
   - Training files must be viewable inside the app, not only downloadable.
   - Remove Slide Pages Text from training upload.
   - Retail/Management sees clear training score summary for employees/managers.
   - Quiz becomes one-question-at-a-time, one attempt per question, final submit at the end.
   - Show score before final submit.
   - Remove duplicated Close buttons in all modals.
*/
(function(){
  window.V23TrainingFix = {version:'V23 Training Viewer + Quiz Flow Fix'};

  const oldModal = modal;
  modal = function(html){
    oldModal(html);
    try{
      const card = document.querySelector('.modal:last-child .modal-card');
      if(!card) return;
      const closes = Array.from(card.querySelectorAll('button')).filter(b=>{
        const txt=(b.textContent||'').trim().toLowerCase();
        const oc=String(b.getAttribute('onclick')||'').toLowerCase();
        return txt==='close' && oc.includes('closemodal');
      });
      closes.slice(1).forEach(b=>b.remove());
    }catch(e){}
  };

  function v23EmpRole(e){return String(e?.role||'employee').toLowerCase().replace(/\s+/g,'_')}
  function v23IsMgrEmp(e){return ['manager','branch_manager','team_leader','retail_head','head_office_admin','head_office','admin','management','master','hr'].includes(v23EmpRole(e))}
  function cleanQuestionText(txt){return String(txt||'').replace(/^\s*(?:Q[:.)-]\s*)/i,'').replace(/^\s*\d+[\).:-]?\s*/,'').trim()}
  function isPdfFile(fileOrName){const name=String(fileOrName?.name||fileOrName||'').toLowerCase();const type=String(fileOrName?.type||'').toLowerCase();return name.endsWith('.pdf') || type.includes('pdf')}
  function isImageFileName(fileOrName){const name=String(fileOrName?.name||fileOrName||'').toLowerCase();const type=String(fileOrName?.type||'').toLowerCase();return type.startsWith('image/') || /\.(png|jpe?g|webp|gif)$/i.test(name)}
  function latestAttempt(mid,eid){return (S.trainingAttempts||[]).filter(a=>a.module_id===mid&&a.employee_id===eid).sort((a,b)=>new Date(b.taken_at||0)-new Date(a.taken_at||0))[0]||null}
  function completionFor(mid,eid){return (S.trainingCompletions||[]).find(c=>c.module_id===mid&&c.employee_id===eid&&String(c.status||'completed')==='completed')||null}
  function trainingEligibleEmployees(m){
    const list=(S.allEmployees?.length?S.allEmployees:S.employees||[]).filter(e=>e.is_active!==false&&String(e.activation_status||'').toLowerCase()!=='deleted');
    const aud=String(m?.audience||'all').toLowerCase();
    return list.filter(e=>{
      if(aud==='all') return true;
      if(aud==='employees') return !v23IsMgrEmp(e);
      if(aud==='managers') return v23IsMgrEmp(e);
      if(aud==='branch') return String(e.branch||'')===String(m.branch||'');
      if(aud==='national') return String(e.branch||'').toUpperCase()==='NATIONAL BRANCH';
      return true;
    });
  }
  function mediaBadge(m){
    if(!m?.attachment_url) return '<span class="pill gray">No File</span>';
    if(isPptxFile(m.attachment_name)) return '<span class="pill yellow">PPTX Viewable</span>';
    if(isPdfFile(m.attachment_name)) return '<span class="pill red">PDF Viewable</span>';
    if(isImageFileName(m.attachment_name)) return '<span class="pill blue">Image Viewable</span>';
    return '<span class="pill gray">Attachment</span>';
  }
  function attachmentViewerHtml(m){
    if(!m?.attachment_url) return '';
    const name=esc(m.attachment_name||'Training file');

  // Better quiz parser: accepts Q: blocks, numbered questions, Correct Answer, or --- separator.
  parseQuizText = function(text){
    text=String(text||'').replace(/\r/g,'').trim(); if(!text) return [];
    let blocks=text.includes('---')?text.split(/\n\s*---\s*\n/g):text.split(/(?=^\s*(?:Q[:.)-]|\d+[\).]\s+))/gmi);
    blocks=blocks.map(x=>x.trim()).filter(Boolean);
    const rows=[];
    blocks.forEach((block,i)=>{
      const lines=block.split(/\n+/).map(x=>x.trim()).filter(Boolean);
      const isOpt=l=>/^[A-D][\)\.:-]\s*/i.test(l);
      const isAns=l=>/^(correct\s*)?(answer|ans)[:.)-]/i.test(l);
      const qLine=lines.find(l=>/^Q[:.)-]/i.test(l)) || lines.find(l=>!isOpt(l)&&!isAns(l)&&!/^(explanation|why)[:.)-]/i.test(l)) || '';
      const get=(letter)=>{const re=new RegExp('^'+letter+'[\\)\\.:-]\\s*(.*)$','i'); const line=lines.find(l=>re.test(l)); return line?line.replace(re,'$1').trim():''};
      const ansLine=lines.find(isAns)||'';
      const expLine=lines.find(l=>/^(explanation|why)[:.)-]/i.test(l))||'';
      const ans=(ansLine.replace(/^(correct\s*)?(answer|ans)[:.)-]\s*/i,'').trim().charAt(0)||'A').toUpperCase();
      const question=cleanQuestionText(qLine);
      if(question){rows.push({question_text:question,option_a:get('A'),option_b:get('B'),option_c:get('C'),option_d:get('D'),correct_answer:['A','B','C','D'].includes(ans)?ans:'A',explanation:expLine.replace(/^(explanation|why)[:.)-]\s*/i,'').trim(),sort_order:i+1,is_active:true});}
    });
    return rows.filter(r=>r.option_a||r.option_b||r.option_c||r.option_d);
  };

  window.v23QuizState={};
  function startQuizState(mid){const qs=quizQuestions(mid);window.v23QuizState[mid]={idx:0,answers:{},correct:0,locked:{},startedAt:new Date().toISOString(),total:qs.length};return window.v23QuizState[mid]}

    const q=qs[idx]; const chosen=st.answers[q.id]; const locked=!!st.locked[q.id]; const right=String(q.correct_answer||'A').toUpperCase();
    const opts=['A','B','C','D'].map(letter=>{const val=q['option_'+letter.toLowerCase()]; if(!val)return ''; const isChosen=chosen===letter; const isRight=right===letter; let badge=''; if(locked&&isChosen)badge=isRight?' <span class="pill green">Your answer</span>':' <span class="pill red">Your answer</span>'; if(locked&&isRight)badge+=' <span class="pill green">Correct</span>'; return `<button type="button" class="btn ${locked?(isRight?'green':isChosen?'red':'ghost'):'ghost'} full" style="justify-content:flex-start;text-align:left;margin:8px 0" ${locked?'disabled':''} onclick="answerTrainingQuiz('${mid}','${q.id}','${letter}')"><b>${letter}.</b>&nbsp; ${esc(val)}${badge}</button>`}).join('');

  function missionIsFinished(t){return ['submitted','pending_merit','approved','completed','cancelled'].includes(String(t?.status||'').toLowerCase()) || !!t?.proof_url}
  function missionIsOpen(t){return isMission(t) && !missionIsFinished(t) && !!t?.due_at}
  function missionTimes(t){
    const start=new Date(t.created_at||t.assigned_at||t.accepted_at||Date.now()).getTime();
    const due=new Date(t.due_at||0).getTime();
    const now=Date.now();
    const total=Math.max(1,due-start); const elapsed=Math.max(0,now-start); const pct=Math.min(100,Math.max(0,Math.round(elapsed/total*100)));
    return {start,due,now,total,elapsed,pct,overdue:due>0 && now>due,warning:due>0 && now<due && pct>=75};
  }

  window.missionDemeritReview=async function(id,btn){

  function showMissionReminder(t,type){

  function v25IsImageFile(fileOrName){const name=String(fileOrName?.name||fileOrName||'').toLowerCase();const type=String(fileOrName?.type||'').toLowerCase();return type.startsWith('image/')||/\.(png|jpe?g|webp|gif)$/i.test(name)}

  // If a PPTX contains many embedded images, do not save huge base64 layout JSON in DB.
  function v25SlimTrainingSlide(slide){

        const lay=typeof s.layout_json==='string'?JSON.parse(s.layout_json):s.layout_json;
        if(lay && Array.isArray(lay.elements)){
          // Keep text layers, remove heavy embedded base64 images to avoid DB timeout.
          lay.elements=lay.elements.filter(el=>!(el.type==='image' && String(el.src||'').startsWith('data:')));
          s.layout_json=JSON.stringify(lay);
        }
      }
      if(s.layout_json && String(s.layout_json).length>180000){

  function v25CleanQuestionText(txt){
    return String(txt||'').replace(/^\s*(?:Q\s*[:.)-]\s*)/i,'').replace(/^\s*\d+\s*[\).:-]?\s*/,'').trim();
  }
  function v25ParseQuizBlocks(text){
    text=String(text||'').replace(/\r/g,'').trim();
    if(!text)return [];
    if(text.includes('---')) return text.split(/\n\s*---\s*\n/g).map(x=>x.trim()).filter(Boolean);
    // Split at each new numbered question or Q: question.
    const parts=text.split(/(?=^\s*(?:Q\s*[:.)-]|\d+\s*[\).:-]\s+))/gim).map(x=>x.trim()).filter(Boolean);
    if(parts.length>1) return parts;
    // Fallback: split after each Correct Answer line when the user pasted without separators.
    return text.split(/(?<=^\s*(?:Correct\s*)?(?:Answer|Ans)\s*[:.)-]\s*[A-D]\s*$)/gim).map(x=>x.trim()).filter(Boolean);
  }

  parseQuizText = function(text){
    const blocks=v25ParseQuizBlocks(text);
    const rows=[];
    blocks.forEach((block,bi)=>{
      const rawLines=block.split(/\n+/).map(x=>x.trim()).filter(Boolean);
      let qParts=[], opts={A:'',B:'',C:'',D:''}, ans='', exp='', current='Q';
      for(const line of rawLines){
        let m=line.match(/^\s*([A-D])\s*[\).:-]\s*(.*)$/i);
        if(m){current=m[1].toUpperCase(); opts[current]=(m[2]||'').trim(); continue;}
        m=line.match(/^\s*(?:Correct\s*)?(?:Answer|Ans)\s*[:.)-]\s*([A-D])\b/i);
        if(m){ans=m[1].toUpperCase(); current='ANS'; continue;}
        m=line.match(/^\s*(?:Explanation|Why)\s*[:.)-]\s*(.*)$/i);
        if(m){exp=(m[1]||'').trim(); current='EXP'; continue;}
        if(current==='Q') qParts.push(line);
        else if(['A','B','C','D'].includes(current)) opts[current]=(opts[current]+' '+line).trim();
        else if(current==='EXP') exp=(exp+' '+line).trim();
      }
      const question=v25CleanQuestionText(qParts.join(' '));
      const complete=question && opts.A && opts.B && opts.C && opts.D && ['A','B','C','D'].includes(ans||'');
      if(complete){
        rows.push({
          question_text:question,
          option_a:opts.A,
          option_b:opts.B,
          option_c:opts.C,
          option_d:opts.D,
          correct_answer:ans,
          explanation:exp,
          sort_order:rows.length+1,
          is_active:true
        });
      }
    });
    return rows;
  };

ype="number" value="80" min="1" max="100" class="input"></div><div class="field"><label>Auto Merit Points if Passed</label><input id="trQuizPoints" type="number" step="0.01" value="0" class="input"></div></div><h4 style="margin-bottom:8px">Flash Exam Question Builder</h4>${v26QuizBuilderHtml()}</div><button class="btn green full">Publish Training</button></form></div>`:'';

  window.renderTrainingQuizSummary=function(mid){

    modal(`<div class="split" style="justify-content:space-between;align-items:center"><div><h2>${passed?'🎉 Congratulations, Ka-Varda!':'Flash Exam Result'}</h2><p class="muted">Score preview before final submit.</p></div><button class="btn sm dark" onclick="closeModal()">Close</button></div><div class="notice ${passed?'success':'danger'}"><h2 style="margin-top:0">${passed?'YOU PASS!':'RETAKE NEEDED'}</h2><b>Score:</b> ${score}%<br><b>Correct:</b> ${correct} of ${qs.length}<br><b>Passing Score:</b> ${money(m.passing_score||80)}%</div><details class="notice"><summary><b>View Answer Review</b></summary>${review}</details><button class="btn ${passed?'green':'yellow'} full" id="submitQuizBtn" onclick="finishTrainingQuiz('${mid}')">Submit Final Score</button>`);

  window.finishTrainingQuiz=async function(mid){

    await act(btn,{busy:'Saving...',success:passed?'Passed ✓':'Saved / Retake',reset:passed?'Passed ✓':'Try Again',toast:passed?'Congrats, you PASS! Training completed.':'Score saved. Please retake until passed.'},async()=>{

      if(passed){

        const cr=await sb.from('vscore_training_completions').upsert({module_id:mid,employee_id:S.profile.id,status:'completed',completed_at:new Date().toISOString(),last_slide_seen:moduleSlides(mid).length,quiz_score:score},{onConflict:'module_id,employee_id'}); if(cr.error)throw cr.error;
        if(!wasAlreadyDone && Number(m.quiz_points||0)>0) await addPoints(S.profile.id,Number(m.quiz_points),'Training exam passed: '+m.title,'training',mid);
        await auditEvent('Training exam passed','vscore_training_quiz_attempts',`${S.profile.full_name} scored ${score}%`);

      else{modal(`<h2>Retake Needed</h2><div class="notice danger"><b>Your score:</b> ${score}%<br><b>Passing score:</b> ${money(m.passing_score||80)}%<br>Please review the training and retake the exam.</div><div class="split"><button class="btn blue" onclick="closeModal();openTraining('${mid}',0)">Review Training</button><button class="btn yellow" onclick="closeModal();openTrainingQuiz('${mid}')">Retake Exam</button></div>`)}

/* ================= V27 PASTE QUIZ + STABLE TRAINING PUBLISH FIX =================
   Requested fix:
   - User wants one-paste quiz entry again, not difficult one-by-one question entry.
   - Keep Flash Exam at the end of training: one question at a time, final score before submit.
   - Fix training "published then disappeared" by rendering from local confirmed publish first,
     then background-refreshing data. Also use light training queries to avoid heavy old file records.
*/
(function(){
  window.V27Fix={version:'V27 Paste Quiz + Stable Training Publish'};
  const TRAINING_BUCKET='vscore-training';
  const cacheKey=()=>`VSCORE_V27_RECENT_TRAININGS_${S.profile?.id||'anon'}`;

  function v27ReadCache(){try{return JSON.parse(localStorage.getItem(cacheKey())||'[]')||[]}catch(e){return []}}
  function v27WriteCache(rows){try{localStorage.setItem(cacheKey(),JSON.stringify((rows||[]).slice(0,30)))}catch(e){}}
  function v27CachePublish(mod,slides,questions){
    if(!mod||!mod.id)return;
    const rows=v27ReadCache().filter(x=>x.mod?.id!==mod.id);
    rows.unshift({mod,slides:slides||[],questions:questions||[],at:new Date().toISOString()});
    v27WriteCache(rows);
  }
  function v27MergeTrainingCache(){
    const rows=v27ReadCache();
    if(!Array.isArray(S.trainingModules))S.trainingModules=[];
    if(!Array.isArray(S.trainingSlides))S.trainingSlides=[];
    if(!Array.isArray(S.trainingQuestions))S.trainingQuestions=[];
    rows.forEach(r=>{
      if(r.mod && r.mod.is_active!==false && !S.trainingModules.find(m=>m.id===r.mod.id))S.trainingModules.unshift(r.mod);
      (r.slides||[]).forEach(s=>{if(!S.trainingSlides.find(x=>(x.id&&s.id&&x.id===s.id)||(!x.id&&x.module_id===s.module_id&&x.slide_no===s.slide_no)))S.trainingSlides.push(s)});
      (r.questions||[]).forEach(q=>{if(!S.trainingQuestions.find(x=>(x.id&&q.id&&x.id===q.id)||(!x.id&&x.module_id===q.module_id&&x.sort_order===q.sort_order)))S.trainingQuestions.push(q)});
    });
  }
  function v27EnsureTrainingVisible(mod,slides,questions){
    if(!mod?.id)return;
    if(!Array.isArray(S.trainingModules))S.trainingModules=[];
    const i=S.trainingModules.findIndex(m=>m.id===mod.id);
    if(i>=0)S.trainingModules[i]=Object.assign({},S.trainingModules[i],mod); else S.trainingModules.unshift(mod);
    if(!Array.isArray(S.trainingSlides))S.trainingSlides=[];
    (slides||[]).forEach(s=>{if(!S.trainingSlides.find(x=>(x.id&&s.id&&x.id===s.id)||(!x.id&&x.module_id===s.module_id&&x.slide_no===s.slide_no)))S.trainingSlides.push(s)});
    if(!Array.isArray(S.trainingQuestions))S.trainingQuestions=[];
    (questions||[]).forEach(q=>{if(!S.trainingQuestions.find(x=>(x.id&&q.id&&x.id===q.id)||(!x.id&&x.module_id===q.module_id&&x.sort_order===q.sort_order)))S.trainingQuestions.push(q)});
  }

  function v27CleanFileName(name){return String(name||'file').replace(/[^a-zA-Z0-9._-]+/g,'-').replace(/-+/g,'-').replace(/^-|-$/g,'').slice(0,90)||'file'}
  function v27Id(){try{return crypto.randomUUID()}catch(e){return String(Date.now())+'-'+Math.random().toString(36).slice(2)}}
  async function v27UploadTrainingFile(file,folder='attachments'){
    if(!file)return '';
    if(typeof window.v25UploadTrainingFile==='function') return await window.v25UploadTrainingFile(file,folder);
    const emp=String(S.profile?.id||'unknown').replace(/[^a-zA-Z0-9-]/g,'');
    const path=`${folder}/${emp}/${new Date().toISOString().slice(0,10)}/${v27Id()}-${v27CleanFileName(file.name)}`;
    const up=await sb.storage.from(TRAINING_BUCKET).upload(path,file,{cacheControl:'3600',upsert:false,contentType:file.type||undefined});
    if(up.error) throw new Error('Training file upload failed. Run the V27 SQL first. Storage error: '+(up.error.message||String(up.error)));
    const pub=sb.storage.from(TRAINING_BUCKET).getPublicUrl(path);
    return pub?.data?.publicUrl||'';
  }
  function v27SlimSlide(slide){
    const s={...slide};
    try{
      if(s.layout_json && String(s.layout_json).length>160000){
        const lay=typeof s.layout_json==='string'?JSON.parse(s.layout_json):s.layout_json;
        if(lay && Array.isArray(lay.elements)){
          lay.elements=lay.elements.filter(el=>!(el.type==='image' && String(el.src||'').startsWith('data:')));
          s.layout_json=JSON.stringify(lay);
        }
      }
      if(s.layout_json && String(s.layout_json).length>160000){s.layout_json='';s.content=(s.content||'')+'\n\nNote: PPTX preview was too complex. Upload PDF or slide images for exact view.';}
    }catch(e){s.layout_json=''}
    return s;
  }

  function v27NormalizeQuizText(text){
    return String(text||'')
      .replace(/\r/g,'')
      .replace(/[“”]/g,'"')
      .replace(/[‘’]/g,"'")
      .replace(/\u00a0/g,' ')
      .trim();
  }
  function v27CleanQuestion(q){return String(q||'').replace(/^\s*(?:Q\s*[:.)-]\s*|\d+\s*[\).:-]\s*)/i,'').trim()}
  function v27SplitQuizBlocks(text){
    text=v27NormalizeQuizText(text);
    if(!text)return [];
    if(/\n\s*---\s*\n/.test(text)) return text.split(/\n\s*---\s*\n/g).map(x=>x.trim()).filter(Boolean);
    const lines=text.split('\n');
    const blocks=[]; let cur=[];
    for(const line of lines){
      const starts=/^\s*(?:Q\s*[:.)-]|\d+\s*[\).:-]\s+)/i.test(line);
      if(starts && cur.length){blocks.push(cur.join('\n').trim()); cur=[];}
      cur.push(line);
      if(/^\s*(?:Correct\s*)?(?:Answer|Ans)\s*[:.)-]\s*[A-D]\s*$/i.test(line)){
        blocks.push(cur.join('\n').trim()); cur=[];
      }
    }
    if(cur.join('').trim())blocks.push(cur.join('\n').trim());
    return blocks.filter(Boolean);
  }
  window.parseQuizText=function(text){
    const blocks=v27SplitQuizBlocks(text);
    const rows=[];
    blocks.forEach((block)=>{
      const lines=block.split(/\n+/).map(x=>x.trim()).filter(Boolean);
      let qParts=[], opts={A:'',B:'',C:'',D:''}, ans='', exp='', current='Q';
      lines.forEach(line=>{
        let m=line.match(/^\s*([A-D])\s*[\).:-]\s*(.*)$/i);
        if(m){current=m[1].toUpperCase(); opts[current]=(m[2]||'').trim(); return;}
        m=line.match(/^\s*(?:Correct\s*)?(?:Answer|Ans)\s*[:.)-]\s*([A-D])\b/i);
        if(m){ans=m[1].toUpperCase(); current='ANS'; return;}
        m=line.match(/^\s*(?:Explanation|Why|Note)\s*[:.)-]\s*(.*)$/i);
        if(m){exp=(m[1]||'').trim(); current='EXP'; return;}
        if(current==='Q') qParts.push(line);
        else if(['A','B','C','D'].includes(current)) opts[current]=(opts[current]+' '+line).trim();
        else if(current==='EXP') exp=(exp+' '+line).trim();
      });
      const question=v27CleanQuestion(qParts.join(' '));
      if(question && opts.A && opts.B && opts.C && opts.D && ['A','B','C','D'].includes(ans)){
        rows.push({question_text:question,option_a:opts.A,option_b:opts.B,option_c:opts.C,option_d:opts.D,correct_answer:ans,explanation:exp,sort_order:rows.length+1,is_active:true});
      }
    });
    return rows;
  };
  window.v27PreviewQuiz=function(){
    const ta=document.getElementById('trQuizText'), box=document.getElementById('trQuizPreview'); if(!ta||!box)return;
    const rows=parseQuizText(ta.value); const enabled=document.getElementById('trQuizEnabled')?.value==='true';
    const color=rows.length?'green':'yellow';
    box.innerHTML=`<span class="pill ${color}">${rows.length} valid question(s) detected</span>${enabled&&!rows.length?' <span class="pill red">Exam enabled but no valid questions</span>':''}`+
      (rows.length?`<details style="margin-top:8px"><summary><b>Preview detected questions</b></summary>${rows.slice(0,12).map((q,i)=>`<div style="border-top:1px solid var(--line);padding-top:8px;margin-top:8px"><b>${i+1}. ${esc(q.question_text)}</b><br><span class="small">A. ${esc(q.option_a)}<br>B. ${esc(q.option_b)}<br>C. ${esc(q.option_c)}<br>D. ${esc(q.option_d)}</span><br><span class="pill green">Correct: ${esc(q.correct_answer)}</span></div>`).join('')}</details>`:'<p class="small muted">Paste in numbered format: Question, A/B/C/D options, then Correct Answer: B.</p>');
  };

/* ================= V28 QUIZ ANSWER REVIEW SECURITY FIX =================
   Purpose:
   - FAILED quiz/exam must NOT show the correct answer key or answer review.
   - PASSED quiz/exam may show answer review.
   - Final failed modal stays score-only + retake required.
   - This protects the exam from answer memorization after failed attempts.
======================================================================= */
(function(){
  window.V28Fix={version:'V28 Quiz Answer Review Security'};

  function v28ExamState(mid){
    return (window.v26ExamState&&window.v26ExamState[mid]) || {answers:{},idx:0,total:0};
  }
  function v28ExamStats(mid){
    const m=(S.trainingModules||[]).find(x=>x.id===mid);
    const qs=quizQuestions(mid)||[];
    const st=v28ExamState(mid);
    const correct=qs.filter(q=>String(st.answers[q.id]||'').toUpperCase()===String(q.correct_answer||'A').toUpperCase()).length;
    const score=qs.length?Math.round((correct/qs.length)*100):0;
    const passed=score>=Number(m?.passing_score||80);
    return {m,qs,st,correct,score,passed};
  }
  function v28AnswerReviewHtml(qs,answers){
    return (qs||[]).map((q,i)=>{
      const ans=answers[q.id]||'-';
      const right=String(q.correct_answer||'A').toUpperCase();
      const ok=String(ans).toUpperCase()===right;
      return `<div style="border-top:1px solid var(--line);padding-top:8px;margin-top:8px"><b>${i+1}. ${esc(q.question_text)}</b><br><span class="pill ${ok?'green':'red'}">Your Answer: ${esc(ans)}</span> <span class="pill green">Correct: ${esc(right)}</span>${q.explanation?`<br><span class="small muted">${esc(q.explanation)}</span>`:''}</div>`;
    }).join('');
  }

  window.renderTrainingQuizSummary=function(mid){
    const {m,qs,st,correct,score,passed}=v28ExamStats(mid);
    if(!m||!qs.length){toast('No exam questions found.','error');return;}
    const answerArea = passed
      ? `<details class="notice"><summary><b>View Answer Review</b></summary>${v28AnswerReviewHtml(qs,st.answers)}</details>`
      : `<div class="notice warning"><b>Answer key hidden.</b><br>For failed attempts, correct answers are not shown. Please review the training and retake until you pass.</div>`;
    modal(`<div class="split" style="justify-content:space-between;align-items:center"><div><h2>${passed?'🎉 Congratulations, Ka-Varda!':'Flash Exam Result'}</h2><p class="muted">Score preview before final submit.</p></div><button class="btn sm dark" onclick="closeModal()">Close</button></div><div class="notice ${passed?'success':'danger'}"><h2 style="margin-top:0">${passed?'YOU PASS!':'RETAKE NEEDED'}</h2><b>Score:</b> ${score}%<br><b>Correct:</b> ${correct} of ${qs.length}<br><b>Passing Score:</b> ${money(m.passing_score||80)}%</div>${answerArea}<button class="btn ${passed?'green':'yellow'} full" id="submitQuizBtn" onclick="finishTrainingQuiz('${mid}')">Submit Final Score</button>`);
  };

  window.finishTrainingQuiz=async function(mid){
    const btn=document.getElementById('submitQuizBtn');
    const {m,qs,st,correct,score,passed}=v28ExamStats(mid);
    if(!m||!qs.length){toast('No exam questions found.','error');return;}
    const wasAlreadyDone=trainingDone(mid,S.profile.id);
    const safeAnswers={...(st.answers||{})};
    await act(btn,{busy:'Saving...',success:passed?'Passed ✓':'Saved / Retake',reset:passed?'Passed ✓':'Try Again',toast:passed?'Congrats, you PASS! Training completed.':'Score saved. Correct answers are hidden. Please retake until passed.'},async()=>{
      const ar=await sb.from('vscore_training_quiz_attempts').insert({module_id:mid,employee_id:S.profile.id,score,total_questions:qs.length,correct_count:correct,passed,passing_score:Number(m.passing_score||80),answers_json:safeAnswers,taken_at:new Date().toISOString()});
      if(ar.error)throw ar.error;
      if(passed){
        if(!wasAlreadyDone && typeof postTrainingPassToNewsFeed==='function') await postTrainingPassToNewsFeed(m,score);
        const cr=await sb.from('vscore_training_completions').upsert({module_id:mid,employee_id:S.profile.id,status:'completed',completed_at:new Date().toISOString(),last_slide_seen:moduleSlides(mid).length,quiz_score:score},{onConflict:'module_id,employee_id'});
        if(cr.error)throw cr.error;
        if(!wasAlreadyDone && Number(m.quiz_points||0)>0) await addPoints(S.profile.id,Number(m.quiz_points),'Training exam passed: '+m.title,'training',mid);
        await auditEvent('Training exam passed','vscore_training_quiz_attempts',`${S.profile.full_name} scored ${score}%`);
      }else{
        await auditEvent('Training exam failed','vscore_training_quiz_attempts',`${S.profile.full_name} scored ${score}%`);
      }
    },async()=>{
      if(window.v26ExamState) delete window.v26ExamState[mid];
      await loadData();
      if(passed){
        const review=v28AnswerReviewHtml(qs,safeAnswers);
        modal(`<h2>🎉 Congratulations, Ka-Varda!</h2><div class="notice success"><b>YOU PASS!</b><br><br><b>Score:</b> ${score}%<br><b>Status:</b> Training marked DONE.${!wasAlreadyDone?'<br><b>Recognition:</b> Posted to VARDA News Feed.':''}${Number(m.quiz_points||0)>0&&!wasAlreadyDone?`<br><b>Merit:</b> +${money(m.quiz_points)} V-Points earned.`:''}</div><details class="notice"><summary><b>View Answer Review</b></summary>${review}</details><div class="split"><button class="btn green" onclick="closeModal();renderPage()">Done</button><button class="btn blue" onclick="closeModal();S.tab='news';renderPage()">View News Feed</button></div>`);
      }else{
        modal(`<h2>Retake Needed</h2><div class="notice danger"><b>Your score:</b> ${score}%<br><b>Passing score:</b> ${money(m.passing_score||80)}%<br><b>Answer key:</b> Hidden until passed.<br><br>Please review the training and retake the exam.</div><div class="split"><button class="btn blue" onclick="closeModal();openTraining('${mid}',0)">Review Training</button><button class="btn yellow" onclick="closeModal();openTrainingQuiz('${mid}')">Retake Exam</button></div>`);
      }
    });
  };
})();

/* ================= V29 TRAINING NO-DISAPPEAR FIX =================
   Purpose:
   - Fix issue where a newly published training shows briefly then disappears.
   - Preserve already-visible training modules during background sync.
   - Let managers see trainings they created / branch trainings even when audience is employees.
   - Keep staff visibility restricted to assigned audience.
================================================================== */
(function(){
  window.V29Fix={version:'V29 Training No-Disappear Fix'};

  function v29Now(){return new Date().toISOString()}
  function v29IdOf(x){return x&&x.id?String(x.id):''}
  function v29RecentEnough(x){
    const d=x?.created_at||x?.updated_at||x?.at;
    if(!d)return true;
    const t=Date.parse(d); if(!isFinite(t))return true;
    return (Date.now()-t) < 1000*60*60*24*14; // preserve recent training up to 14 days during sync
  }
  function v29MergeUnique(primary, fallback, keyFn){
    const out=[]; const seen=new Set();
    [...(primary||[]),...(fallback||[])].forEach(x=>{
      const k=keyFn(x); if(!k||seen.has(k))return;
      seen.add(k); out.push(x);
    });
    return out;
  }
  function v29TrainingVisible(m){
    if(!m || m.is_active===false) return false;
    const aud=String(m.audience||'all').toLowerCase();
    const myBranch=String(S.profile?.branch||'');
    const modBranch=String(m.branch||'');
    const createdBy=String(m.created_by||'');
    const myId=String(S.profile?.id||'');

    // Retail / Head Office / Management should see every active training.
    if(typeof isOwner==='function' && isOwner()) return true;

    // Managers/team leaders need a management view. They should not lose their own published modules.
    if(typeof isManager==='function' && isManager()){
      if(createdBy && createdBy===myId) return true;
      if(aud==='all') return true;
      if(aud==='managers') return true;
      if(aud==='branch' && modBranch===myBranch) return true;
      // Employees-only trainings in the same branch should still appear in manager monitoring.
      if(aud==='employees' && (!modBranch || modBranch===myBranch)) return true;
      if(aud==='national' && typeof national==='function' && national()) return true;
      return false;
    }

    // Staff view: only assigned training.
    if(aud==='all') return true;
    if(aud==='employees') return true;
    if(aud==='branch' && modBranch===myBranch) return true;
    if(aud==='national' && typeof national==='function' && national()) return true;
    return false;
  }

  // Replace the older global visibility function used by training loaders.
  try{ trainingVisible = v29TrainingVisible; window.trainingVisible=v29TrainingVisible; }catch(e){ window.trainingVisible=v29TrainingVisible; }

  function v29RememberCurrentTraining(){
    if(!S)return;
    window.__v29TrainingKeep={
      mods:[...(S.trainingModules||[])].filter(m=>m&&m.is_active!==false&&v29RecentEnough(m)),
      slides:[...(S.trainingSlides||[])],
      questions:[...(S.trainingQuestions||[])],
      at:v29Now()
    };
  }
  function v29RestoreKeptTraining(){
    const keep=window.__v29TrainingKeep||{};
    const currentMods=(S.trainingModules||[]).filter(m=>m&&m.is_active!==false);
    const keepMods=(keep.mods||[]).filter(m=>m&&m.is_active!==false&&v29RecentEnough(m));
    S.trainingModules=v29MergeUnique(currentMods,keepMods,v29IdOf).filter(v29TrainingVisible);
    S.trainingModules.sort((a,b)=>String(b.created_at||'').localeCompare(String(a.created_at||'')));
    S.trainingSlides=v29MergeUnique((S.trainingSlides||[]),(keep.slides||[]),x=>String(x?.id||`${x?.module_id||''}-${x?.slide_no||''}`));
    S.trainingQuestions=v29MergeUnique((S.trainingQuestions||[]),(keep.questions||[]),x=>String(x?.id||`${x?.module_id||''}-${x?.sort_order||''}`));
  }
  window.v29RememberCurrentTraining=v29RememberCurrentTraining;
  window.v29RestoreKeptTraining=v29RestoreKeptTraining;

  // Protect every loadData call so background refresh cannot wipe the training list.
  const _v29PrevLoadData=loadData;
  loadData=async function(){
    v29RememberCurrentTraining();
    try{ await _v29PrevLoadData(); }
    catch(e){ console.warn('V29 protected loadData: previous load failed, keeping current training data.', e?.message||e); }
    v29RestoreKeptTraining();
  };

  // Strengthen training page render: always restore preserved modules before showing the library.
  const _v29PrevTrainingPage=window.trainingPage || trainingPage;
  window.trainingPage=trainingPage=function(){
    try{v29RestoreKeptTraining();}catch(e){}
    const html=_v29PrevTrainingPage();
    return `<div class="notice success"><b>Training Sync Stable:</b> Published modules are protected during background refresh. If you just published a training, it will stay visible while V-SCORE verifies the database.</div>`+html;
  };

  // After publish button finishes, wait a moment and protect/re-render. This handles delayed Supabase sync.
  const _v29PrevCreateTraining=window.createTraining;
  if(typeof _v29PrevCreateTraining==='function'){
    window.createTraining=async function(e){
      await _v29PrevCreateTraining(e);
      setTimeout(()=>{try{v29RememberCurrentTraining();v29RestoreKeptTraining();if(S.tab==='training')renderPage();}catch(err){console.warn(err)}},1200);
    };
  }

  // Bind should keep using the latest createTraining wrapper after old bind clones the form.
  const _v29PrevBind=bind;
  bind=function(){
    _v29PrevBind();
    const form=document.getElementById('trainingForm');
    if(form){
      const fresh=form.cloneNode(true);
      form.parentNode.replaceChild(fresh,form);
      fresh.addEventListener('submit',window.createTraining);
      const ta=document.getElementById('trQuizText');
      if(ta && typeof v27PreviewQuiz==='function'){
        ta.addEventListener('input',v27PreviewQuiz);
        setTimeout(v27PreviewQuiz,60);
      }
    }
  };
})();
/* ================= END V29 TRAINING NO-DISAPPEAR FIX ================= */



/* ================= V30 TRAINING TAB HARD STABLE FIX =================
   FINAL training stability patch:
   - Stop all automatic/background refresh while Training form is being used.
   - Do not let renderPage wipe text while typing.
   - Force-load training modules with a wider query so old modules are not hidden.
   - Keep paste-only quiz format and preview.
   - After successful publish, clear form once and show module immediately.
===================================================================== */
(function(){
  window.V30Fix={version:'V30 Training Tab Hard Stable'};

  function v30IsTrainingTab(){ return String(S?.tab||'')==='training'; }
  function v30TrainingForm(){ return document.getElementById('trainingForm'); }
  function v30IsEditable(el){ if(!el)return false; const t=(el.tagName||'').toUpperCase(); return t==='INPUT'||t==='TEXTAREA'||t==='SELECT'||el.isContentEditable; }
  function v30FormHasText(form){
    if(!form)return false;
    return Array.from(form.querySelectorAll('input,textarea,select')).some(el=>{
      const typ=String(el.type||'').toLowerCase();
      if(typ==='file') return !!(el.files&&el.files.length);
      if(typ==='checkbox'||typ==='radio') return !!el.checked;
      const id=el.id||'';
      const val=String(el.value||'');
      if(['trPassing','trQuizPoints'].includes(id)) return false;
      if(id==='trQuizEnabled' && val==='false') return false;
      return val.trim().length>0;
    });
  }
  function v30TrainingDirty(){
    const form=v30TrainingForm();

 Images / PPT Style Pages</label><input id="acadImages" type="file" accept="image/*" class="input" multiple><p class="small muted">Recommended: export PowerPoint slides as images then upload here. Staff can scroll through them like onboarding training.</p></div><div class="notice"><b>Optional Onboarding Exam</b><div class="grid three"><div class="field"><label>Require Quiz?</label><select id="acadQuizEnabled"><option value="false">No Quiz</option><option value="true">Require Quiz</option></select></div><div class="field"><label>Passing Score %</label><input id="acadPassing" type="number" min="1" max="100" value="80" class="input"></div><div class="field"><label>Merit Points if Passed</label><input id="acadPoints" type="number" step="0.01" value="0" class="input"></div></div><div class="field"><label>Paste Quiz Once Only</label><textarea id="acadQuizText" style="min-height:230px" placeholder="${esc(acadQuizSample())}"></textarea><p class="small muted">Format: number, A/B/C/D choices, then Correct Answer: A/B/C/D. Failed employees will NOT see the answer key. Passed employees may view answer review.</p><div id="acadQuizPreview" style="margin-top:8px"></div></div></div><div class="split"><button class="btn green" type="submit">Publish Academy Training</button><button class="btn ghost" type="button" id="acadClearDraft">Clear Draft</button></div></form></div>`;

      const slides=acadSlides(m.id).length;

      return `<div class="notice"><div class="split" style="justify-content:space-between"><div><b>${esc(m.title)}</b><br><span class="small muted">${esc(m.objective||'')}</span></div>${acadStatusPill(m.id)}</div><p class="small"><b>Audience:</b> ${esc(m.audience||'all')} ${m.branch?`· <b>Branch:</b> ${esc(m.branch)}`:''}<br><b>Pages:</b> ${slides||1} · <b>Completed:</b> ${done}<br><b>Quiz:</b> ${m.quiz_enabled?`${qs} question(s), passing ${money(m.passing_score||80)}%`:'Off / not required'}</p><div class="split">${m.attachment_url?`<span class="pill yellow">${acadIsDriveUrl(m.attachment_url)?'Training File Ready':'Training File Ready'}</span>`:''}${m.video_url?'<span class="pill blue">Video</span>':''}${acadPassed(m.id)?'<span class="pill green">Passed</span>':''}</div><div class="split" style="margin-top:10px"><button class="btn blue acadOpen" data-id="${m.id}">Open Training</button>${acadCanEdit()?`<button class="btn red acadDelete" data-id="${m.id}">Deactivate</button>`:''}</div></div>`}).join('')}</div>`;

  function academyScoreboard(){
    const mods=S.academyModules||[];
    if(!mods.length)return '<div class="empty">No Academy training records yet.</div>';
    const moduleRows=mods.map(m=>{
      const elig=acadEligibleEmployees(m);
      const comp=elig.filter(e=>acadCompletion(m.id,e.id)).length;
      const attempts=acadAttempts(m.id);
      const scores=attempts.filter(a=>a.passed).map(a=>Number(a.score||0));
      const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):0;
      return `<tr><td><b>${esc(m.title)}</b></td><td>${elig.length}</td><td>${comp}</td><td>${m.quiz_enabled?'Required':'No quiz'}</td><td>${scores.length?avg+'%':'-'}</td><td><button class="btn sm blue acadOpen" data-id="${m.id}">Preview</button></td></tr>`;
    }).join('');
    let scoreRows='';
    mods.forEach(m=>acadEligibleEmployees(m).forEach(e=>{
      const att=acadLatestAttempt(m.id,e.id), attempts=acadAttempts(m.id,e.id).length, comp=acadCompletion(m.id,e.id);
      const status=comp?'<span class="pill green">DONE</span>':att?(att.passed?'<span class="pill green">PASSED</span>':'<span class="pill red">RETAKE</span>'):'<span class="pill yellow">PENDING</span>';
      scoreRows+=`<tr><td><b>${esc(e.full_name)}</b><br><span class="small muted">${esc(roleLabel(e.role))}</span></td><td>${esc(e.branch||'')}</td><td>${esc(m.title)}</td><td>${status}</td><td><b>${att?money(att.score)+'%':'-'}</b></td><td>${attempts}</td><td>${comp?fmt(comp.completed_at):'-'}</td></tr>`;
    }));
    return `<h4>Module Summary</h4><table><thead><tr><th>Training</th><th>Eligible</th><th>Completed</th><th>Quiz</th><th>Avg Pass Score</th><th>Action</th></tr></thead><tbody>${moduleRows}</tbody></table><h4>Employee / Manager Score Summary</h4><table><thead><tr><th>Name</th><th>Branch</th><th>Training</th><th>Status</th><th>Latest Score</th><th>Attempts</th><th>Completed At</th></tr></thead><tbody>${scoreRows||'<tr><td colspan="7"><div class="empty">No score records yet.</div></td></tr>'}</tbody></table>`;
  }

  function acadBind(){
    const f=acadForm();
    if(f && f.dataset.bound!=='true'){
      acadRestoreDraft();
      f.dataset.bound='true';
      f.addEventListener('input',()=>{f.dataset.dirty='true'; acadSaveDraft(); acadPreviewQuiz();},true);
      f.addEventListener('change',()=>{f.dataset.dirty='true'; acadSaveDraft(); acadPreviewQuiz();},true);
      f.addEventListener('submit',acadPublish);
      document.getElementById('acadQuizEnabled')?.addEventListener('change',acadPreviewQuiz);
      document.getElementById('acadClearDraft')?.addEventListener('click',()=>{f.reset();f.dataset.dirty='false';acadClearDraft();acadPreviewQuiz();toast('Academy draft cleared.','success')});
      acadPreviewQuiz();
    }
    $$('.acadOpen').forEach(b=>b.onclick=()=>openAcademyTraining(b.dataset.id,0));
    $$('.acadDelete').forEach(b=>b.onclick=()=>deleteAcademyTraining(b.dataset.id,b));
    const reload=document.getElementById('acadReload');
    if(reload) reload.onclick=e=>act(e.currentTarget,{busy:'Loading...',success:'Loaded',reset:'Reload Academy',toast:'Academy reloaded.'},async()=>{await acadLoad()},()=>{if(!acadDirty())renderPage();});
  }

  window.acadPublish=async function(e){
    e.preventDefault();
    const f=e.currentTarget, btn=e.submitter;
    await act(btn,{busy:'Publishing...',success:'Published',reset:'Publish Another',toast:'Academy training published.'},async()=>{
      const title=document.getElementById('acadTitle').value.trim();
      const objective=document.getElementById('acadObjective').value.trim();
      if(!title || !objective)throw new Error('Training title and objective are required.');
      const quizEnabled=document.getElementById('acadQuizEnabled').value==='true';
      const questions=parseAcademyQuiz(document.getElementById('acadQuizText').value||'');
      if(quizEnabled && !questions.length)throw new Error('Quiz is required but no valid questions were detected. Check your paste format.');
      const file=document.getElementById('acadFile').files[0];
      const driveLink=(document.getElementById('acadDriveLink')?.value||'').trim();
      const imgs=[...document.getElementById('acadImages').files];
      let uploaded={url:'',path:'',name:''};
      if(driveLink){
        if(!acadIsDriveUrl(driveLink))throw new Error('Please paste a valid Google Drive link, or leave the Google Drive Link field blank and upload a file instead.');
        uploaded={url:driveLink,path:'google-drive-link',name:'Google Drive Training Link'};
      }else if(file){
        uploaded=await acadUploadFile(file,'files');
      }
      const mod={title,objective,audience:document.getElementById('acadAudience').value,branch:document.getElementById('acadBranch').value||null,video_url:document.getElementById('acadVideo').value.trim(),attachment_url:uploaded.url,attachment_storage_path:uploaded.path,attachment_name:uploaded.name,file_type:driveLink?'google_drive':(file?(file.type||acadExt(file.name)):''),quiz_enabled:quizEnabled,passing_score:Number(document.getElementById('acadPassing').value||80),merit_points:Number(document.getElementById('acadPoints').value||0),created_by:S.profile.id,is_active:true,created_at:new Date().toISOString()};
      const r=await sb.from('vscore_academy_modules').insert(mod).select().single();
      if(r.error)throw r.error;
      const published=r.data;
      const slides=[];
      for(let i=0;i<imgs.length;i++){
        const up=await acadUploadFile(imgs[i],'slides');
        slides.push({module_id:published.id,slide_no:i+1,title:`Slide ${i+1}`,content:'Review this training slide.',image_url:up.url,image_storage_path:up.path,is_active:true});
      }
      if(!slides.length){
        slides.push({module_id:published.id,slide_no:1,title:'Training Overview',content:objective||'Open and review the training file.',image_url:null,is_active:true});
      }
      const sr=await sb.from('vscore_academy_slides').insert(slides).select(); if(sr.error)throw sr.error;
      let savedQs=[];
      if(questions.length){
        const qr=await sb.from('vscore_academy_questions').insert(questions.map(q=>({...q,module_id:published.id}))).select(); if(qr.error)throw qr.error; savedQs=qr.data||[];
      }
      S.academyModules=[published,...(S.academyModules||[]).filter(x=>x.id!==published.id)];
      S.academySlides=[...(sr.data||[]),...(S.academySlides||[])];
      S.academyQuestions=[...savedQs,...(S.academyQuestions||[])];
      await auditEvent('Academy training published','vscore_academy_modules',title);
    },async()=>{
      f.reset(); f.dataset.dirty='false'; acadClearDraft(); acadPreviewQuiz(); await acadLoad(); renderPage();
    });
  };

  function academyFileViewer(m){
    const url=m.attachment_url||''; if(!url)return '';
    const n=m.attachment_name||'Training File';
    const ownerView=(typeof isOwner==='function' && isOwner());
    if(acadIsDriveUrl(url)){
      const preview=acadDrivePreviewUrl(url), open=acadDriveOpenUrl(url);
      return `<iframe class="academy-file-frame" src="${esc(preview)}" allow="autoplay"></iframe>${ownerView?`<p class="small muted"><b>Source tool:</b> secure cloud link is active. <a class="btn sm blue" target="_blank" href="${esc(open)}">Open Source File</a></p>`:`<p class="small muted">Training file is loaded inside V-SCORE. If the preview does not load, please ask Retail Management to check file permission.</p>`}`;
    }
    if(acadIsImage(n,m.file_type)) return `<div class="academy-slide"><div class="academy-slide-inner"><img src="${esc(url)}" onclick="zoom('${esc(url)}')"></div></div>`;
    if(acadIsPdf(n,m.file_type)) return `<iframe class="academy-file-frame" src="${esc(url)}"></iframe>`;
    if(acadIsPpt(n,m.file_type)){
      const office='https://view.officeapps.live.com/op/embed.aspx?src='+encodeURIComponent(url);
      return `<iframe class="academy-file-frame" src="${office}"></iframe>${ownerView?`<p class="small muted">For exact display, PDF or slide images are recommended. <a class="btn sm blue" target="_blank" href="${esc(url)}">Open Source File</a></p>`:`<p class="small muted">Training file is loaded inside V-SCORE.</p>`}`;
    }
    return `<div class="notice"><b>Training file is ready.</b>${ownerView?`<br><a class="btn sm blue" target="_blank" href="${esc(url)}">Open Source File</a>`:''}</div>`;
  }

  window.openAcademyTraining=function(mid,idx=0){
    const m=(S.academyModules||[]).find(x=>String(x.id)===String(mid)); if(!m)return toast('Academy training not found.','error');
    const slides=acadSlides(mid); const total=Math.max(1,slides.length);
    const vid=typeof youtubeEmbed==='function'?youtubeEmbed(m.video_url):'';
    const fileBlock=m.attachment_url?`<div class="card" style="margin:12px 0"><h3>Training Viewer</h3>${academyFileViewer(m)}</div>`:'';
    const videoBlock=vid?`<div class="card" style="margin:12px 0"><h3>Training Video</h3><iframe style="width:100%;aspect-ratio:16/9;border:0;border-radius:18px" src="${esc(vid)}" allowfullscreen></iframe></div>`:'';
    const slideRows=(slides.length?slides:[{title:'Training Overview',content:m.objective||'Review this training module.',image_url:null}]).map((s,i)=>{
      const visual=s.image_url
        ? `<div class="academy-slide"><div class="academy-slide-inner"><img src="${esc(s.image_url)}" onclick="zoom('${esc(s.image_url)}')"></div></div>`
        : `<div class="academy-slide"><div class="academy-slide-inner"><div class="academy-slide-text"><h3>${esc(s.title||('Page '+(i+1)))}</h3><p>${esc(s.content||m.objective||'Review the attached training file.')}</p></div></div></div>`;
      return `<section class="academy-scroll-page"><div class="split" style="justify-content:space-between;align-items:center;margin:8px 0"><span class="pill blue">Page ${i+1} of ${total}</span><span class="small muted">Scroll to continue</span></div>${visual}</section>`;
    }).join('');
    const action=`<div class="academy-done-bar"><div><b>End of Training</b><br><span class="small muted">After reviewing all materials, continue to the exam or mark done.</span></div><button class="btn green" onclick="${m.quiz_enabled&&!acadPassed(mid)?`openAcademyQuiz('${mid}')`:`completeAcademyTraining('${mid}',this)`}">${m.quiz_enabled&&!acadPassed(mid)?'Start Onboarding Exam':'Mark Training Done ✓'}</button></div>`;
    modal(`<div class="split" style="justify-content:space-between;align-items:flex-start"><div><h2>${esc(m.title)}</h2><p class="muted">Scroll Training Viewer · ${total} page(s) · ${acadStatusPill(mid)} ${m.quiz_enabled?'· Exam required':''}</p></div><button class="btn sm dark" onclick="closeModal()">Close</button></div><div class="notice success"><b>Scroll mode:</b> Review the training continuously. No next/previous buttons needed.</div>${fileBlock}${videoBlock}<div class="academy-scroll-deck">${slideRows}</div>${action}`);
  };

  window.completeAcademyTraining=async function(mid,btn){
    const m=(S.academyModules||[]).find(x=>String(x.id)===String(mid)); if(!m)return;
    await act(btn,{busy:'Saving...',success:'Done ✓',reset:'Done ✓',toast:'Training marked done.'},async()=>{
      const r=await sb.from('vscore_academy_completions').upsert({module_id:mid,employee_id:S.profile.id,status:'completed',score:null,completed_at:new Date().toISOString()},{onConflict:'module_id,employee_id'}).select().single(); if(r.error)throw r.error;
      S.academyCompletions=[r.data,...(S.academyCompletions||[]).filter(c=>!(String(c.module_id)===String(mid)&&String(c.employee_id)===String(S.profile.id)))];
      await auditEvent('Academy training completed','vscore_academy_completions',m.title);
    },()=>{closeModal(); renderPage();});
  };

  function startAcademyExam(mid){const qs=acadQuestions(mid); window.acadExamState[mid]={idx:0,answers:{},correct:0,locked:{},total:qs.length,startedAt:new Date().toISOString()}; return window.acadExamState[mid]}
  function examState(mid){return window.acadExamState[mid]||startAcademyExam(mid)}
  window.openAcademyQuiz=function(mid){const qs=acadQuestions(mid); if(!qs.length)return toast('No exam questions found.','error'); startAcademyExam(mid); renderAcademyQuizStep(mid)};
  window.renderAcademyQuizStep=function(mid){
    const m=(S.academyModules||[]).find(x=>String(x.id)===String(mid)); const qs=acadQuestions(mid); const st=examState(mid); const idx=Math.max(0,Math.min(st.idx,qs.length));
    if(idx>=qs.length)return renderAcademyQuizSummary(mid);
    const q=qs[idx]; const chosen=st.answers[q.id]; const locked=!!st.locked[q.id];
    const opts=['A','B','C','D'].map(L=>{const val=q['option_'+L.toLowerCase()]; return `<button type="button" class="btn ${locked&&chosen===L?'blue':'ghost'} full academy-option" ${locked?'disabled':''} onclick="answerAcademyQuiz('${mid}','${q.id}','${L}')"><b>${L}.</b>&nbsp; ${esc(val||'')}</button>`}).join('');
    modal(`<div class="split" style="justify-content:space-between;align-items:flex-start"><div><h2>${esc(m.title)} - Onboarding Exam</h2><p class="muted">Question ${idx+1} of ${qs.length} · Passing ${money(m.passing_score||80)}%</p></div><button class="btn sm dark" onclick="closeModal()">Close</button></div><div class="meter"><span style="width:${Math.round((idx/qs.length)*100)}%"></span></div><div class="card" style="box-shadow:none;margin-top:12px"><div class="academy-question">${idx+1}. ${esc(q.question_text)}</div><p class="small muted">One answer only for this question. Correct answer is hidden during the exam.</p>${opts}${locked?'<div class="notice success"><b>Answer saved.</b> Proceed to the next question.</div>':''}</div><div class="split" style="justify-content:space-between;margin-top:12px"><span class="pill blue">Answered: ${Object.keys(st.answers).length}/${qs.length}</span>${locked?`<button class="btn blue" onclick="closeModal();nextAcademyQuiz('${mid}')">${idx>=qs.length-1?'See Final Score':'Next Question'}</button>`:'<span class="pill yellow">Choose one answer to continue</span>'}</div>`);
  };
  window.answerAcademyQuiz=function(mid,qid,L){const qs=acadQuestions(mid); const q=qs.find(x=>String(x.id)===String(qid)); const st=examState(mid); if(!q||st.locked[qid])return; st.answers[qid]=L; st.locked[qid]=true; if(String(L).toUpperCase()===String(q.correct_answer||'A').toUpperCase())st.correct++; closeModal(); renderAcademyQuizStep(mid)};
  window.nextAcademyQuiz=function(mid){const st=examState(mid); st.idx++; renderAcademyQuizStep(mid)};
  window.renderAcademyQuizSummary=function(mid){
    const m=(S.academyModules||[]).find(x=>String(x.id)===String(mid)); const qs=acadQuestions(mid); const st=examState(mid); const score=qs.length?Math.round((st.correct/qs.length)*100):0; const passed=score>=Number(m.passing_score||80);
    modal(`<div class="split" style="justify-content:space-between;align-items:center"><div><h2>${passed?'🎉 Congratulations, Ka-Varda!':'Exam Score Preview'}</h2><p class="muted">Score is shown before final submission. Answer key is hidden unless you pass.</p></div><button class="btn sm dark" onclick="closeModal()">Close</button></div><div class="notice ${passed?'success':'danger'}"><h2 style="margin-top:0">${passed?'YOU PASS!':'RETAKE REQUIRED'}</h2><b>Score:</b> ${score}%<br><b>Correct:</b> ${st.correct} of ${qs.length}<br><b>Passing Score:</b> ${money(m.passing_score||80)}%</div><p class="muted">${passed?'Submit to complete this training.':'Submit this attempt, review the training, then retake. Correct answers will not be shown.'}</p><button class="btn ${passed?'green':'yellow'} full" id="academySubmitScore" onclick="finishAcademyQuiz('${mid}')">Submit Final Score</button>`);
  };
  window.finishAcademyQuiz=async function(mid){
    const btn=document.getElementById('academySubmitScore'); const m=(S.academyModules||[]).find(x=>String(x.id)===String(mid)); const qs=acadQuestions(mid); const st=examState(mid); const score=qs.length?Math.round((st.correct/qs.length)*100):0; const passed=score>=Number(m.passing_score||80); const wasDone=!!acadCompletion(mid,S.profile.id);
    await act(btn,{busy:'Saving...',success:passed?'Passed ✓':'Attempt Saved',reset:passed?'Passed ✓':'Retake',toast:passed?'Congratulations, you PASS!':'Retake required.'},async()=>{
      const ar=await sb.from('vscore_academy_attempts').insert({module_id:mid,employee_id:S.profile.id,score,total_questions:qs.length,correct_count:st.correct,passed,passing_score:Number(m.passing_score||80),answers_json:st.answers,taken_at:new Date().toISOString()}).select().single(); if(ar.error)throw ar.error;
      S.academyAttempts=[ar.data,...(S.academyAttempts||[])];
      if(passed){
        const cr=await sb.from('vscore_academy_completions').upsert({module_id:mid,employee_id:S.profile.id,status:'completed',score,completed_at:new Date().toISOString()},{onConflict:'module_id,employee_id'}).select().single(); if(cr.error)throw cr.error;
        S.academyCompletions=[cr.data,...(S.academyCompletions||[]).filter(c=>!(String(c.module_id)===String(mid)&&String(c.employee_id)===String(S.profile.id)))];

  /* ================= V36 GOOGLE DRIVE IFRAME UPLOAD FIX =================
     Fixes browser "Failed to fetch" by avoiding CORS fetch for Google Apps Script.
     Requires Apps Script V2 code included in this package.
  */
  const VSCORE_DRIVE_BRIDGE_MODE = 'iframe-post';

  function v36HiddenDriveFormPost(payload, timeoutMs=90000){
    return new Promise((resolve,reject)=>{
      const token='vscore_'+Date.now()+'_'+Math.random().toString(36).slice(2);
      payload = Object.assign({}, payload, {iframeUpload:'1', token});
      const iframeName='vscore_drive_iframe_'+token;
      const iframe=document.createElement('iframe');
      iframe.name=iframeName;
      iframe.style.display='none';
      iframe.style.width='0';
      iframe.style.height='0';
      iframe.style.border='0';
      const form=document.createElement('form');
      form.method='POST';
      form.action=window.VSCORE_DRIVE_BRIDGE_URL;
      form.target=iframeName;
      form.enctype='application/x-www-form-urlencoded';
      form.style.display='none';
      Object.entries(payload).forEach(([k,v])=>{
        const input=document.createElement('input');
        input.type='hidden';
        input.name=k;
        input.value=(v==null?'':String(v));
        form.appendChild(input);
      });
      let done=false;
      const cleanup=()=>{
        window.removeEventListener('message',onMsg);
        setTimeout(()=>{try{iframe.remove();form.remove();}catch(e){}},500);
      };
      const timer=setTimeout(()=>{
        if(done)return;
        done=true; cleanup();
        reject(new Error('Google Drive upload timed out. Try smaller/compressed photos or redeploy the Apps Script V2 bridge.'));
      },timeoutMs);
      function onMsg(ev){
        const data=ev.data||{};
        if(!data || data.vscoreDriveUpload!==true || data.token!==token) return;
        if(done)return;
        done=true; clearTimeout(timer); cleanup();
        const res=data.payload||{};
        if(res.ok) resolve(res);
        else reject(new Error('Google Drive upload failed: '+(res.error||'Unknown bridge error')));
      }
      window.addEventListener('message',onMsg);
      document.body.appendChild(iframe);
      document.body.appendChild(form);
      form.submit();
    });
  }

/* ================= V39 GOOGLE DRIVE IMAGE PREVIEW FIX =================
   Google Drive uploads were successful, but <img src="drive.google.com/uc?..."> can render as a broken image.
   This patch converts Drive file links into thumbnail display URLs inside V-SCORE, while keeping storage hidden.
   No SQL and no Apps Script change required if V38 bridge auth already works.

(function(){
  function v39DriveFileId(url){
    const s=String(url||'');
    let m=s.match(/[?&]id=([^&]+)/i); if(m&&m[1]) return decodeURIComponent(m[1]);
    m=s.match(/\/file\/d\/([^\/]+)/i); if(m&&m[1]) return decodeURIComponent(m[1]);
    m=s.match(/\/d\/([^\/]+)/i); if(m&&m[1]) return decodeURIComponent(m[1]);
    return '';
  }
  function v39DriveThumb(url, size='w1400'){
    const id=v39DriveFileId(url);
    if(!id) return String(url||'');
    return `https://drive.google.com/thumbnail?id=${encodeURIComponent(id)}&sz=${encodeURIComponent(size)}`;
  }
  function v39DriveDownload(url){
    const id=v39DriveFileId(url);
    if(!id) return String(url||'');
    return `https://drive.google.com/uc?export=view&id=${encodeURIComponent(id)}`;
  }
  function v39IsDrive(url){return /(?:drive|docs)\.google\.com/i.test(String(url||''));}
  function v39DisplayUrl(url){return v39IsDrive(url)?v39DriveThumb(url):String(url||'');}

  window.v39DriveFileId=v39DriveFileId;
  window.v39DriveThumb=v39DriveThumb;
  window.v39DisplayUrl=v39DisplayUrl;

  // Make future Drive upload responses return thumbnail URLs for images.
  if(typeof v34DriveUploadDataUrl==='function'){
    const _v39BaseDriveUploadDataUrl=v34DriveUploadDataUrl;
    v34DriveUploadDataUrl=async function(dataUrl,file,folder,prefix='vscore'){
      const res=await _v39BaseDriveUploadDataUrl(dataUrl,file,folder,prefix);
      if(res && res.fileId){
        res.thumbnailUrl=`https://drive.google.com/thumbnail?id=${encodeURIComponent(res.fileId)}&sz=w1400`;
        const mime=(file&&file.type)||res.mimeType||'';
        if(String(mime).startsWith('image/')){
          res.directViewUrl=res.thumbnailUrl;
          res.viewUrl=res.thumbnailUrl;
        }
      }
      return res;
    };
  }

  // Normalize imageData/fileData results so newly saved posts display immediately.
  if(typeof imageData==='function'){
    const _v39BaseImageData=imageData;
    imageData=async function(file,max=900){
      const url=await _v39BaseImageData(file,max);

  }
  if(typeof fileData==='function'){
    const _v39BaseFileData=fileData;
    fileData=async function(file,max=1200){
      const url=await _v39BaseFileData(file,max);
      if(file && String(file.type||'').startsWith('image/')) return v39DisplayUrl(url);

/* ================= V40 ALL IMAGE STORAGE + LINK-ONLY HEAVY TRAINING =================
   Final storage rule:
   - All staff/user image uploads go to company Google Drive bridge, hidden from users.
   - Chat images use a dedicated Chat Attachments folder.
   - News Feed images use a dedicated News Feed Images folder.
   - Heavy Academy training files (PPT/PPTX/PDF/video) should be shared by secure link only.
   - Staff sees files inside V-SCORE with no Google Drive wording.
*/
(function(){
  function v40IsHeavyTrainingFile(file){
    const name=String(file?.name||'').toLowerCase();
    const type=String(file?.type||'').toLowerCase();
    return /\.(ppt|pptx|pdf|mp4|mov|avi|mkv|webm)$/i.test(name) ||
      type.includes('presentation') || type.includes('powerpoint') || type.includes('pdf') || type.startsWith('video/');
  }
  function v40IsImageFile(file){return String(file?.type||'').startsWith('image/') || /\.(png|jpe?g|webp|gif)$/i.test(String(file?.name||''));}

  // Clearer Drive folder routing. Normal users never see this text.
  if(typeof v34CurrentDriveFolder==='function'){
    v34CurrentDriveFolder=function(defaultFolder='09 General Uploads'){
      const tab=String(S?.tab||'').toLowerCase();
      if(tab.includes('chat') || tab.includes('message')) return '09 Chat Attachments';
      if(tab.includes('news') || tab.includes('memory') || tab.includes('feed')) return '01 News Feed Images';
      if(tab.includes('academy') || tab.includes('training')) return '02 Academy Training';
      if(tab.includes('mission')) return '03 Mission Proof';
      if(tab.includes('case') || tab.includes('violation') || tab.includes('concern') || tab.includes('fsqa')) return '04 Case Evidence';
      if(tab.includes('memo')) return '05 Memo Attachments';
      if(tab.includes('profile') || tab.includes('employee') || tab.includes('accounts')) return '06 Employee Documents';
      if(tab.includes('form')) return '07 Forms Library';
      if(tab.includes('task')) return '08 Tasklist Proof';
      return defaultFolder;
    };
  }

  async function v40CompressedImageToDrive(file, folder, prefix='image', max=900){
    if(!file) return {url:'',name:''};
    let dataUrl='';
    if(v40IsImageFile(file)){
      if(typeof _v34LocalImageData==='function') dataUrl=await _v34LocalImageData(file,max);
      else if(typeof v34ReadFileDataUrl==='function') dataUrl=await v34ReadFileDataUrl(file);
      else dataUrl=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result);r.onerror=rej;r.readAsDataURL(file)});
      const up=await v34DriveUploadDataUrl(dataUrl,file,folder,prefix);
      const url=up.thumbnailUrl||up.directViewUrl||up.viewUrl||up.url||'';
      return {url,name:file.name,driveFileId:up.fileId||'',storage:'company-drive'};
    }
    const up=await v34DriveUploadFile(file,folder,prefix);
    const url=up.embedUrl||up.viewUrl||up.url||up.directViewUrl||'';
    return {url,name:file.name,driveFileId:up.fileId||'',storage:'company-drive'};
  }
  window.v40CompressedImageToDrive=v40CompressedImageToDrive;

  async function v40UploadImages(input,max,folder,prefix='vscore_image'){
    const files=Array.from(input?.files||[]).slice(0,max);
    const arr=[];
    for(const f of files){
      const item=await v40CompressedImageToDrive(f,folder,prefix,900);
      if(item.url) arr.push({url:item.url,name:f.name,stamp:(typeof serverStamp==='function'?await serverStamp():new Date().toISOString()),storage:'company-drive'});

  }

        const caption=(isMemory?document.getElementById('memCaption')?.value:document.getElementById('newsCaption')?.value||'').trim();
        if(!caption && !photos.length) throw new Error('Add a caption or at least one photo.');
        const row={
          post_type:type,

          photos_json:JSON.stringify(photos),
          created_by:S.profile.id,
          branch:!isMemory && document.getElementById('newsScope')?.value==='branch'?document.getElementById('newsBranch').value:S.profile.branch,
          share_scope:!isMemory?(document.getElementById('newsScope')?.value||'all'):'own',
          comments_enabled:!isMemory?(document.getElementById('newsCommentsOn')?.value==='true'):true,
          expires_at:isMemory?new Date(Date.now()+86400000).toISOString():new Date(Date.now()+86400000).toISOString(),
          is_active:true

      },async()=>{await loadData();renderPage();});

  }

  // Chat: text stays in Supabase, photos go to Google Drive folder 09 Chat Attachments.

      let r=await sb.from('vscore_chat_messages').insert({room_id:currentRoom,sender_id:S.profile.id,message_text:text,media_json:JSON.stringify(imgs),is_active:true});
      if(r.error&&String(r.error.message||'').includes('media_json'))r=await sb.from('vscore_chat_messages').insert({room_id:currentRoom,sender_id:S.profile.id,message_text:text,is_active:true});
      if(r.error)return toast(r.error.message,'error');
      try{await sb.from('vscore_chat_rooms').update({updated_at:new Date().toISOString()}).eq('id',currentRoom)}catch(e){}
      if(document.getElementById('chatText'))document.getElementById('chatText').value='';
      if(document.getElementById('chatPhoto'))document.getElementById('chatPhoto').value='';
      await loadData();renderChatBody();

      html=html.replace(/accept="\.ppt,\.pptx,\.pdf,image\/\*"/g,'accept="image/*"');
      html=html.replace(/Upload PDF, PPTX, image, or training file\. V-SCORE will save the file in the company storage bridge\./g,'For heavy PPT, PDF, or video, paste the secure training link below. Use this upload only for small images or slide pictures.');
      html=html.replace(/Upload PDF, PPTX, image, or training file\./g,'Use this upload only for small images or slide pictures.');
      html=html.replace(/Existing Training File Link \(Optional\)|Secure Training File Link \(Recommended for large files\)/g,'Training File Link for PPT / PDF / Video (Recommended)');
      html=html.replace(/Optional: paste an existing secure training link if the file was already uploaded outside V-SCORE\./g,'Paste the secure view-only link for PPT, PDF, or large video. Staff will view it inside V-SCORE.');
      html=html.replace(/Paste secure file share link here\./g,'Paste secure file share link here.');
      return html;
    };
  }

  // Academy publish guard: do not direct-upload heavy PPT/PDF/video through the browser bridge.
  if(typeof acadPublish==='function'){

    acadPublish=async function(e){
      const file=document.getElementById('acadFile')?.files?.[0];

        e.preventDefault();

      }
      return _v40AcadPublish.call(this,e);
    };
    window.acadPublish=acadPublish;

  // Staff-facing Academy file viewer: generic wording only.
  if(typeof academyFileViewer==='function'){

      html=html.replace(/Open Source File/g,'Open Training File');
      html=html.replace(/Source tool:/g,'Admin tool:');
      return html;
    };
  }

  // Normalize Drive images after chat/news render too.
  if(typeof renderChatBody==='function'){
    const _v40RenderChatBody=renderChatBody;

  }
})();
