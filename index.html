async function deleteAccount(id,btn){const e=emp(id);if(e.id===S.profile.id)return toast('You cannot delete your own active management account.','error');const reason=prompt('Reason for permanent removal? resigned / AWOL / terminated / duplicate');if(!reason)return;if(!confirm('FINAL CONFIRMATION: Remove '+e.full_name+' from monitoring, summaries, account backup, rankings, and login access?'))return;await act(btn,{busy:'Removing...',success:'Removed',reset:'Removed',toast:'Account removed from system monitoring.'},async()=>{await sb.from('audit_trail').insert({action:'account_permanent_removed',table_name:'employees',record_id:id,changed_by:S.profile.id,details:reason});const r=await sb.from('employees').update({is_active:false,hidden_from_monitoring:true,activation_status:'permanent_deleted',deletion_reason:reason,deleted_at:new Date().toISOString(),permanent_deleted_at:new Date().toISOString(),permanent_deleted_by:S.profile.id}).eq('id',id);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
function missionsPage(){const manage=isManager();const selectable=S.employees.filter(e=>e.id!==S.profile.id);return `<div class="grid two"><div class="card"><h3>Share My Tasklist</h3><form id="selfTask"><div class="field"><label>Task Title</label><input id="selfTitle" class="input" required></div><div class="field"><label>Checklist Done</label><textarea id="selfItems" required></textarea></div><div class="field"><label>Proof Photo</label><input id="selfProof" type="file" accept="image/*" class="input" required></div><button class="btn green full">Submit Tasklist for Merit Review</button></form></div>${manage?`<div class="card"><h3>Assign Special Mission</h3><form id="missionForm"><div class="field"><label>Mission Target</label><select id="missionScope"><option value="individual">One Employee</option>${isOwner()?'<option value="all_managers">All Managers / Team Leaders Nationwide</option><option value="all_employees">All Active Employees Nationwide</option><option value="branch_all">All Users in Selected Branch</option>':'<option value="branch_staff">All Active Users in My Branch</option>'}</select></div><div class="field"><label>Assign To</label><select id="missionTo">${selectable.map(e=>`<option value="${e.id}">${esc(e.full_name)} - ${esc(e.branch)}</option>`).join('')}</select></div>${isOwner()?`<div class="field"><label>Branch for Branch-Wide</label>${branchSelect('missionBranch',S.profile.branch)}</div>`:''}<div class="field"><label>Mission Title</label><input id="missionTitle" class="input" required></div><div class="field"><label>Task Checklist</label><textarea id="missionItems" required></textarea></div><div class="grid two"><div class="field"><label>Merit Points</label><input id="missionPts" type="number" step="0.01" value="2" class="input"></div><div class="field"><label>Due Date</label><input id="missionDue" type="datetime-local" class="input"></div></div><button class="btn orange full">Assign Mission</button></form></div>`:''}</div><br><div class="card"><h3>${manage?'Mission Monitoring':'My Mission Summary'}</h3>${taskTable(manage?S.tasks:S.tasks.filter(t=>t.assigned_to_employee_id===S.profile.id),manage)}</div>`}
function taskTable(arr,manage){return `<table><thead><tr><th>Mission</th><th>Assigned To</th><th>From</th><th>Status</th><th>Due</th><th>Proof</th><th>Action</th></tr></thead><tbody>${arr.map(t=>`<tr><td><b>${esc(t.title)}</b><br><span class="small">${esc(t.task_items||'')}</span></td><td>${esc(safeName(t.assigned_to_employee_id))}</td><td>${esc(safeName(t.assigned_by_employee_id))}</td><td>${esc(t.status)}</td><td>${fmt(t.due_at)}</td><td>${img(t.proof_url)}</td><td>${missionActions(t,manage)}</td></tr>`).join('')||'<tr><td colspan="7"><div class="empty">No missions.</div></td></tr>'}</tbody></table>`}
function missionActions(t,manage){if(!manage&&['assigned','accepted','disagreed'].includes(t.status))return `<button class="btn sm green acceptTask" data-id="${t.id}">Accept</button> <button class="btn sm ghost disagreeTask" data-id="${t.id}">Disagree</button> <button class="btn sm blue proofTask" data-id="${t.id}">Submit Proof</button>`;if(manage){let out='';if(['submitted','pending_merit'].includes(t.status))out+=`<button class="btn sm green approveTask" data-id="${t.id}">Approve Merit</button> `;if(!['approved','cancelled'].includes(t.status))out+=`<button class="btn sm dark cancelTask" data-id="${t.id}">Cancel Mission</button>`;return out||'<span class="small muted">-</span>'}return '<span class="small muted">-</span>'}
async function selfTask(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Submitting...',success:'Submitted',reset:'Submit Again',toast:'Tasklist sent.'},async()=>{const imgd=await imageData($('#selfProof').files[0]);const r=await sb.from('vscore_tasks').insert({title:$('#selfTitle').value,task_items:$('#selfItems').value,assigned_to_employee_id:S.profile.id,assigned_by_employee_id:S.profile.id,branch:S.profile.branch,source_type:'self_tasklist',status:'pending_merit',proof_url:imgd,submitted_at:new Date().toISOString(),merit_points:1});if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
function targetEmployees(){const scope=$('#missionScope').value;if(scope==='individual')return [emp($('#missionTo').value)].filter(e=>e.id);if(scope==='all_managers')return S.employees.filter(e=>e.id!==S.profile.id&&['manager','branch_manager','team_leader'].includes(String(e.role).toLowerCase()));if(scope==='all_employees')return S.employees.filter(e=>e.id!==S.profile.id);if(scope==='branch_all')return S.employees.filter(e=>e.id!==S.profile.id&&e.branch===$('#missionBranch').value);if(scope==='branch_staff')return S.employees.filter(e=>e.id!==S.profile.id&&e.branch===S.profile.branch);return []}
async function assignMission(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Assigning...',success:'Assigned',reset:'Assign Another Mission',toast:'Mission assigned.'},async()=>{const targets=targetEmployees();if(!targets.length)throw new Error('No target employees found.');const rows=targets.map(t=>({title:$('#missionTitle').value,task_items:$('#missionItems').value,assigned_to_employee_id:t.id,assigned_by_employee_id:S.profile.id,branch:t.branch,source_type:'assigned_mission',target_scope:$('#missionScope').value,status:'assigned',due_at:$('#missionDue').value?new Date($('#missionDue').value).toISOString():null,merit_points:Number($('#missionPts').value||1)}));const r=await sb.from('vscore_tasks').insert(rows);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
async function acceptTask(id,btn){await act(btn,{busy:'Accepting...',success:'Accepted',reset:'Accepted',toast:'Mission accepted.'},async()=>{let r=await sb.from('vscore_tasks').update({status:'accepted',accepted_at:new Date().toISOString()}).eq('id',id);if(r.error&&String(r.error.message||'').includes('accepted_at'))r=await sb.from('vscore_tasks').update({status:'accepted'}).eq('id',id);if(r.error)throw r.error;await auditEvent('Mission accepted','vscore_tasks',id)},async()=>{closeModal();await loadData();renderPage()})}
async function disagreeTask(id,btn){const reason=prompt('Reason for disagreeing?');if(!reason)return;await act(btn,{busy:'Saving...',success:'Sent',reset:'Disagree',toast:'Reason sent.'},async()=>{const r=await sb.from('vscore_tasks').update({status:'disagreed',disagree_reason:reason}).eq('id',id);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
function proofTask(id){modal(`<h2>Submit Mission Proof</h2><div class="field"><label>Proof Photo</label><input id="proofFile" type="file" accept="image/*" class="input" required></div><button class="btn green" id="proofBtn">Submit Proof</button> <button class="btn dark" onclick="closeModal()">Close</button>`);$('#proofBtn').onclick=async e=>act(e.currentTarget,{busy:'Uploading...',success:'Proof Sent',reset:'Submit Proof',toast:'Proof submitted.'},async()=>{const imgd=await imageData($('#proofFile').files[0]);let r=await sb.from('vscore_tasks').update({proof_url:imgd,status:'submitted',submitted_at:new Date().toISOString()}).eq('id',id);if(r.error&&String(r.error.message||'').includes('submitted_at'))r=await sb.from('vscore_tasks').update({proof_url:imgd,status:'submitted'}).eq('id',id);if(r.error)throw r.error},async()=>{closeModal();await loadData();renderPage()})}
async function approveTask(id,btn){const t=S.tasks.find(x=>x.id===id);const pts=Number(prompt('Merit points to add?',t?.merit_points||1)||0);await act(btn,{busy:'Approving...',success:'Approved',reset:'Approved',toast:'Mission approved and points added.'},async()=>{if(pts)await addPoints(t.assigned_to_employee_id,pts,'Mission completed: '+t.title,'mission',id);const r=await sb.from('vscore_tasks').update({status:'approved',merit_points:pts,approved_by:S.profile.id,approved_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
async function cancelTask(id,btn){const t=S.tasks.find(x=>x.id===id);const reason=prompt('Reason for cancelling this mission for '+esc(emp(t?.assigned_to_employee_id).full_name)+'?');if(!reason)return;await act(btn,{busy:'Cancelling...',success:'Cancelled',reset:'Cancelled',toast:'Mission cancelled.'},async()=>{const r=await sb.from('vscore_tasks').update({status:'cancelled',cancel_reason:reason,cancelled_by:S.profile.id,cancelled_at:new Date().toISOString(),resolution:'Cancelled by management: '+reason}).eq('id',id);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
async function addPoints(id,pts,reason,type='manual',sid=null){if(!id)throw new Error('No employee selected.');const e=emp(id);const newPts=Number(e.current_points||100)+Number(pts||0);let r=await sb.from('employees').update({current_points:newPts}).eq('id',id);if(r.error)throw r.error;r=await sb.from('ledger').insert({employee_id:id,points_change:pts,reason,source_type:type,source_id:sid,created_by:S.profile.id});if(r.error)throw r.error;await auditEvent('Point change','ledger',`${emp(id).full_name}: ${Number(pts)>0?'+':''}${money(pts)} - ${reason}`)}
function achievementPage(){return `<div class="grid two"><div class="card"><h3>Report My Achievement</h3><form id="achForm"><div class="field"><label>Achievement</label><input id="achTitle" class="input" required></div><div class="field"><label>Story</label><textarea id="achDesc" required></textarea></div><div class="field"><label>Evidence</label><input id="achFile" type="file" accept="image/*" class="input" required></div><button class="btn full">Submit Achievement Report</button></form></div><div class="card"><h3>My Achievement History</h3>${achTable(S.achievements.filter(a=>a.employee_id===S.profile.id),false)}</div></div>`}
function achTable(arr,manage){return `<table><thead><tr><th>Achievement</th><th>Employee</th><th>Status</th><th>Proof</th><th>Action</th></tr></thead><tbody>${arr.map(a=>`<tr><td>${esc(a.title)}<br><span class="small">${esc(a.description||'')}</span></td><td>${esc(emp(a.employee_id).full_name)}</td><td>${esc(a.status)}</td><td>${img(a.evidence_url)}</td><td>${manage&&a.status==='pending'?`<button class="btn sm green approveAch" data-id="${a.id}">Approve Merit</button>`:'-'}</td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">No achievements.</div></td></tr>'}</tbody></table>`}
async function submitAch(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Submitting...',success:'Submitted',reset:'Submit Again',toast:'Achievement sent.'},async()=>{const imgd=await imageData($('#achFile').files[0]);const r=await sb.from('achievements').insert({employee_id:S.profile.id,requested_by:S.profile.id,title:$('#achTitle').value,description:$('#achDesc').value,evidence_url:imgd,status:'pending'});if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
function approvalsPage(){return `<div class="card"><h3>Merit Approvals</h3>${achTable(S.achievements.filter(a=>a.status==='pending'),true)}</div>`}
async function approveAch(id,btn){const a=S.achievements.find(x=>x.id===id),pts=Number(prompt('Merit points to add?',1)||0);await act(btn,{busy:'Approving...',success:'Approved',reset:'Approved',toast:'Merit applied.'},async()=>{if(pts)await addPoints(a.employee_id,pts,'Approved achievement: '+a.title,'achievement',id);const r=await sb.from('achievements').update({status:'approved',points:pts,reviewed_by:S.profile.id,reviewed_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
function concernPage(){const people=S.employees.filter(e=>e.id!==S.profile.id);return `<div class="grid two"><div class="card"><h3>Private Report Concern</h3><form id="concernForm"><div class="field"><label>Reported Employee</label><select id="repEmp"><option value="">Manual / Not Listed</option>${people.map(e=>`<option value="${e.id}">${esc(e.full_name)} - ${esc(e.branch)}</option>`).join('')}</select></div><div class="field"><label>Manual Name if not listed</label><input id="repManual" class="input"></div><div class="field"><label>Manager on Duty / Witness</label><input id="repManager" class="input" placeholder="Type name or none"></div><div class="field"><label>What happened?</label><textarea id="repStory" required></textarea></div><div class="field"><label>Evidence</label><input id="repFile" type="file" accept="image/*" class="input" required></div><button class="btn orange full">Submit Private Report</button></form></div><div class="card"><h3>My Reports</h3>${reportsTable(S.reports.filter(r=>r.reporter_employee_id===S.profile.id),false)}</div></div>`}
function reportsPage(){return `<div class="card"><h3>Private Reports / Investigations</h3>${reportsTable(S.reports,true)}</div>`}
function reportsTable(arr,manage){return `<table><thead><tr><th>Reporter</th><th>Reported</th><th>Story</th><th>Status</th><th>Evidence</th><th>Action</th></tr></thead><tbody>${arr.map(r=>`<tr><td>${esc(emp(r.reporter_employee_id).full_name)}</td><td>${esc(r.reported_employee_id?emp(r.reported_employee_id).full_name:r.reported_name_manual||'-')}</td><td>${esc(r.story||'')}</td><td>${esc(r.status)}</td><td>${img(r.evidence_url)}</td><td>${reportActions(r,manage)}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">No reports.</div></td></tr>'}</tbody></table>`}
function reportActions(r,manage){let st=String(r.status||'').toLowerCase();let out='';if(manage&&['new_private','read','under_investigation'].includes(st)){out+=`<button class="btn sm green trueReport" data-id="${r.id}">Resolve True</button> <button class="btn sm dark falseReport" data-id="${r.id}">False</button> `}if((manage||r.reporter_employee_id===S.profile.id)&&!['resolved_true','resolved_false','cancelled'].includes(st)){out+=`<button class="btn sm ghost cancelReport" data-id="${r.id}">Cancel Report</button>`}return out||'-'}
async function submitConcern(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Submitting...',success:'Submitted',reset:'Submit Again',toast:'Private report sent.'},async()=>{const imgd=await imageData($('#repFile').files[0]);const r=await sb.from('investigation_reports').insert({reporter_employee_id:S.profile.id,reported_employee_id:$('#repEmp').value||null,reported_name_manual:$('#repManual').value,manager_on_duty:$('#repManager').value,branch:S.profile.branch,story:$('#repStory').value,evidence_url:imgd,status:'new_private',happened_at:new Date().toISOString()});if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
async function resolveReport(id,truth,btn){const r=S.reports.find(x=>x.id===id);await act(btn,{busy:'Resolving...',success:'Resolved',reset:'Resolved',toast:'Report resolved.'},async()=>{if(truth){const rew=Number(prompt('Reward reporter points?',r.reward_points||1)||0);const dem=Number(prompt('Demerit reported employee points?',r.reported_demerit_points||3)||0);if(rew)await addPoints(r.reporter_employee_id,rew,'Valid private report','investigation',id);if(dem&&r.reported_employee_id)await addPoints(r.reported_employee_id,-Math.abs(dem),'Proven private report demerit','investigation',id);await sb.from('investigation_reports').update({status:'resolved_true',resolution:'Proven true',resolved_by:S.profile.id,resolved_at:new Date().toISOString()}).eq('id',id)}else{const pen=Number(prompt('Penalty for false report?',r.false_report_penalty||3)||0);if(pen)await addPoints(r.reporter_employee_id,-Math.abs(pen),'False/unproven private report penalty','investigation',id);await sb.from('investigation_reports').update({status:'resolved_false',resolution:'False/unproven report',resolved_by:S.profile.id,resolved_at:new Date().toISOString()}).eq('id',id)}},async()=>{await loadData();renderPage()})}
async function cancelReport(id,btn){const reason=prompt('Reason for cancelling this report?');if(!reason)return;await act(btn,{busy:'Cancelling...',success:'Cancelled',reset:'Cancelled',toast:'Report cancelled.'},async()=>{const r=await sb.from('investigation_reports').update({status:'cancelled',resolution:reason,resolved_by:S.profile.id,resolved_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;await auditEvent('Private report cancelled','investigation_reports',reason)},async()=>{await loadData();renderPage()})}
function violationsPage(){const manage=isManager();const rules=S.policies.length?S.policies:[];const people=S.employees.filter(e=>e.id!==S.profile.id||manage);return `<div class="grid two">${manage?`<div class="card"><h3>Report / Validate Violation</h3><p class="muted">Direct violation report using management-approved policy basis. Evidence is required.</p><form id="directViolationForm"><div class="field"><label>Employee Involved</label><select id="dvEmp">${people.map(e=>`<option value="${e.id}">${esc(e.full_name)} - ${esc(e.branch)}</option>`).join('')}</select></div><div class="field"><label>Violation Basis / Policy</label><select id="dvPolicy">${rules.map(p=>`<option value="${p.id}" data-points="${Number(p.points||0)}">${esc(p.title)} (${money(p.points||0)} pts)</option>`).join('')||'<option value="">Manual / No policy yet</option>'}</select></div><div class="field"><label>Demerit Points</label><input id="dvPoints" type="number" step="0.01" value="-1" class="input"></div><div class="field"><label>Manager / Witness</label><input id="dvWitness" class="input" placeholder="Type witness or manager on duty"></div><div class="field"><label>Story / Description</label><textarea id="dvStory" required></textarea></div><div class="field"><label>Evidence Photo</label><input id="dvFile" type="file" accept="image/*" class="input" required></div><div class="split"><button class="btn orange full">Submit Violation Report</button></div></form></div>`:''}<div class="card"><h3>${manage?'Violation Records':'My Violation Records'}</h3>${violationTable(manage?S.violations:S.violations.filter(v=>v.employee_id===S.profile.id),manage)}</div></div>`}
function violationTable(arr,manage){return `<table><thead><tr><th>Employee</th><th>Basis</th><th>Points</th><th>Status</th><th>Evidence</th><th>Action</th></tr></thead><tbody>${arr.map(v=>`<tr><td>${esc(emp(v.employee_id).full_name)}</td><td><b>${esc(v.violation_type||v.type_name||'Violation')}</b><br><span class="small">${esc(v.description||v.manager_remarks||'')}</span></td><td><b>${money(v.point_deduction??v.points??0)}</b></td><td>${esc(v.status||'pending_validation')}</td><td>${img(v.evidence_url)}</td><td>${manage?violationActions(v):'-'}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">No violation records.</div></td></tr>'}</tbody></table>`}
function violationActions(v){let st=String(v.status||'pending_validation').toLowerCase();let out='';if(!['validated','closed / deducted','cancelled','rejected'].includes(st))out+=`<button class="btn sm green validateDirectVio" data-id="${v.id}">Validate & Deduct</button> `;if(!['cancelled','validated','closed / deducted'].includes(st))out+=`<button class="btn sm dark cancelDirectVio" data-id="${v.id}">Cancel Report</button>`;return out||'<span class="small muted">Done</span>'}
async function submitDirectViolation(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Submitting...',success:'Submitted',reset:'Submit Another Violation',toast:'Violation report submitted.'},async()=>{const f=$('#dvFile').files[0];if(!f)throw new Error('Evidence photo is required.');const im=await imageData(f);let pol=S.policies.find(p=>p.id===$('#dvPolicy').value);let points=Number($('#dvPoints').value||pol?.points||-1);if(points>0)points=-Math.abs(points);const employee_id=$('#dvEmp').value;const eobj=emp(employee_id);const r=await sb.from('violations').insert({employee_id,reported_by:S.profile.id,violation_type:pol?.title||'Manual Violation',type_name:pol?.title||'Manual Violation',policy_rule_id:pol?.id||null,branch:eobj.branch,description:$('#dvStory').value,manager_remarks:$('#dvWitness').value,point_deduction:points,points, evidence_url:im,status:'pending_validation',created_at:new Date().toISOString()});if(r.error)throw r.error;await auditEvent('Violation report submitted','violations',`${S.profile.full_name} reported ${eobj.full_name}: ${pol?.title||'Manual Violation'}`)},async()=>{await loadData();renderPage()})}
async function validateDirectVio(id,btn){const v=S.violations.find(x=>x.id===id);await act(btn,{busy:'Validating...',success:'Validated',reset:'Validated',toast:'Demerit applied.'},async()=>{const pts=Number(v.point_deduction??v.points??-1);await addPoints(v.employee_id,pts,'Validated violation: '+(v.violation_type||v.type_name||'Violation'),'violation',id);const r=await sb.from('violations').update({status:'validated',validated_by:S.profile.id,validated_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;await auditEvent('Violation validated','violations',`${emp(v.employee_id).full_name} ${money(pts)} points`)},async()=>{await loadData();renderPage()})}
async function cancelDirectVio(id,btn){const reason=prompt('Reason for cancelling this violation report?');if(!reason)return;await act(btn,{busy:'Cancelling...',success:'Cancelled',reset:'Cancelled',toast:'Violation report cancelled.'},async()=>{const r=await sb.from('violations').update({status:'cancelled',resolution:reason,updated_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;await auditEvent('Violation cancelled','violations',reason)},async()=>{await loadData();renderPage()})}
function fsqaPage(){const manage=isManager();return `<div class="grid two">${manage?`<div class="card"><h3>FSQA Branch Grading</h3><p class="muted">Audit score can credit branch merit if target is reached and no critical unresolved failure exists.</p><form id="fsqaForm"><div class="field"><label>Branch</label>${(isOwner()||national())?branchSelect('fsqaBranch',S.profile.branch):`<input id="fsqaBranch" class="input" value="${esc(S.profile.branch)}" readonly>`}</div><div class="grid two"><div class="field"><label>FSQA Score %</label><input id="fsqaScore" class="input" type="number" min="0" max="100" step="0.01" value="95" required></div><div class="field"><label>Branch Merit Points</label><input id="fsqaMerit" class="input" type="number" step="0.01" value="1"></div></div><div class="field"><label>Critical Failure?</label><select id="fsqaCritical"><option value="false">No</option><option value="true">Yes - rectification required</option></select></div><div class="field"><label>Findings / Notes</label><textarea id="fsqaFindings" required></textarea></div><div class="field"><label>Audit Evidence Photo</label><input id="fsqaEvidence" type="file" accept="image/*" class="input" required></div><div class="field"><label>Rectification Photo (if critical)</label><input id="fsqaRectification" type="file" accept="image/*" class="input"></div><button class="btn green full">Save FSQA Audit</button></form></div>`:''}<div class="card"><h3>FSQA Records</h3>${fsqaTable(S.fsqa,manage)}</div></div>`}
function fsqaTable(arr,manage){return `<table><thead><tr><th>Branch</th><th>Score</th><th>Status</th><th>Findings</th><th>Proof</th><th>Action</th></tr></thead><tbody>${arr.map(f=>`<tr><td>${esc(f.branch)}</td><td><b>${money(f.score||f.audit_score||0)}%</b></td><td>${esc(f.status||'closed')}</td><td>${esc(f.findings||'')}</td><td>${img(f.evidence_url)} ${img(f.rectification_url)}</td><td>${manage&&f.is_active!==false?`<button class="btn sm dark delFsqa" data-id="${f.id}">Remove</button>`:'-'}</td></tr>`).join('')||'<tr><td colspan="6"><div class="empty">No FSQA audits yet.</div></td></tr>'}</tbody></table>`}
async function submitFsqa(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Saving...',success:'Saved',reset:'Save Another FSQA',toast:'FSQA audit saved.'},async()=>{const ev=$('#fsqaEvidence').files[0],rx=$('#fsqaRectification').files[0];if(!ev)throw new Error('FSQA evidence photo required.');const critical=$('#fsqaCritical').value==='true';if(critical&&!rx)throw new Error('Critical failure requires rectification photo.');const branch=$('#fsqaBranch').value,score=Number($('#fsqaScore').value||0),merit=Number($('#fsqaMerit').value||0);const evidence_url=await imageData(ev),rectification_url=rx?await imageData(rx):'';const r=await sb.from('fsqa_audits').insert({branch,score,audit_score:score,findings:$('#fsqaFindings').value,evidence_url,rectification_url,status:critical?'closed_with_rectification':'closed',critical_failure:critical,merit_points:merit,is_active:true,created_by:S.profile.id,created_at:new Date().toISOString()}).select().single();if(r.error)throw r.error;if(score>=95&&!critical&&merit){for(const e of S.employees.filter(x=>x.branch===branch&&x.is_active!==false)){await addPoints(e.id,merit,`FSQA branch merit ${score}%`,'fsqa',r.data.id)}}await auditEvent('FSQA audit saved','fsqa_audits',`${branch} ${score}%`)},async()=>{await loadData();renderPage()})}
async function deleteFsqa(id,btn){if(!confirm('Remove this FSQA record from active monitoring?'))return;await act(btn,{busy:'Removing...',success:'Removed',reset:'Removed',toast:'FSQA record removed.'},async()=>{const r=await sb.from('fsqa_audits').update({is_active:false}).eq('id',id);if(r.error)throw r.error;await auditEvent('FSQA removed','fsqa_audits',id)},async()=>{await loadData();renderPage()})}
function policiesPage(){const canEdit=isOwner();return `<div class="grid two">${!canEdit?'<div class="card"><h3>Company Policy Library</h3><p class="muted">Review approved Varda Group policies, violation basis, point deductions, and evidence requirements. These are visible to staff for guidance and transparency.</p></div>':''}${canEdit?`<div class="card"><h3>Add Policy / Violation Basis</h3><form id="policyRuleForm"><div class="field"><label>Violation / Policy Title</label><input id="prTitle" class="input" required placeholder="No Hairnet / Improper Grooming"></div><div class="grid two"><div class="field"><label>Category</label><input id="prCategory" class="input" placeholder="Grooming / FSQA / Attendance"></div><div class="field"><label>Demerit Points</label><input id="prPoints" class="input" type="number" step="0.01" value="-1"></div></div><div class="grid two"><div class="field"><label>Severity</label><select id="prSeverity"><option>Minor</option><option>Moderate</option><option>Critical</option></select></div><div class="field"><label>Source / Basis</label><input id="prSource" class="input" placeholder="Company SOP / FSQA / DOLE / Handbook"></div></div><div class="field"><label>Evidence Requirement</label><input id="prEvidence" class="input" placeholder="Photo required"></div><div class="field"><label>Description / Rule Meaning</label><textarea id="prDesc" required></textarea></div><button class="btn green full">Save Policy Basis</button></form></div>`:''}<div class="card"><h3>Violation Basis Library</h3>${policyTable(S.policies,canEdit)}</div></div>`}
function policyTable(arr,canEdit){return `<table><thead><tr><th>Policy</th><th>Category</th><th>Points</th><th>Basis</th><th>Action</th></tr></thead><tbody>${arr.map(p=>`<tr><td><b>${esc(p.title)}</b><br><span class="small">${esc(p.description||'')}</span></td><td>${esc(p.category||'-')}<br><span class="pill ${String(p.severity).toLowerCase()==='critical'?'red':'yellow'}">${esc(p.severity||'')}</span></td><td><b>${money(p.points||0)}</b></td><td>${esc(p.source||'-')}<br><span class="small">${esc(p.evidence_required||'')}</span></td><td>${canEdit?`<button class="btn sm blue editPolicy" data-id="${p.id}">Edit</button> <button class="btn sm dark delPolicy" data-id="${p.id}">Delete</button>`:'-'}</td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">No policy rules yet.</div></td></tr>'}</tbody></table>`}
async function createPolicyRule(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Saving...',success:'Saved',reset:'Add Another Policy',toast:'Policy basis saved.'},async()=>{const pts=Number($('#prPoints').value||0);const r=await sb.from('vscore_policy_rules').insert({title:$('#prTitle').value,category:$('#prCategory').value,points:pts,severity:$('#prSeverity').value,source:$('#prSource').value,evidence_required:$('#prEvidence').value,description:$('#prDesc').value,is_active:true,created_by:S.profile.id,created_at:new Date().toISOString()});if(r.error)throw r.error;await auditEvent('Policy basis added','vscore_policy_rules',$('#prTitle').value)},async()=>{await loadData();renderPage()})}
function editPolicyRule(id){const p=S.policies.find(x=>x.id===id);if(!p)return;modal(`<h2>Edit Policy Basis</h2><div class="field"><label>Title</label><input id="epTitle" class="input" value="${esc(p.title)}"></div><div class="field"><label>Category</label><input id="epCategory" class="input" value="${esc(p.category||'')}"></div><div class="field"><label>Points</label><input id="epPoints" type="number" step="0.01" class="input" value="${esc(p.points||0)}"></div><div class="field"><label>Severity</label><select id="epSeverity">${['Minor','Moderate','Critical'].map(x=>`<option ${x===p.severity?'selected':''}>${x}</option>`).join('')}</select></div><div class="field"><label>Source</label><input id="epSource" class="input" value="${esc(p.source||'')}"></div><div class="field"><label>Evidence Requirement</label><input id="epEvidence" class="input" value="${esc(p.evidence_required||'')}"></div><div class="field"><label>Description</label><textarea id="epDesc">${esc(p.description||'')}</textarea></div><button id="savePolicyEdit" class="btn green">Save Changes</button> <button class="btn dark" onclick="closeModal()">Close</button>`);$('#savePolicyEdit').onclick=e=>act(e.currentTarget,{busy:'Saving...',success:'Saved',reset:'Save Changes',toast:'Policy updated.'},async()=>{const r=await sb.from('vscore_policy_rules').update({title:$('#epTitle').value,category:$('#epCategory').value,points:Number($('#epPoints').value||0),severity:$('#epSeverity').value,source:$('#epSource').value,evidence_required:$('#epEvidence').value,description:$('#epDesc').value,updated_by:S.profile.id,updated_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;await auditEvent('Policy basis edited','vscore_policy_rules',id)},async()=>{closeModal();await loadData();renderPage()})}
async function deletePolicyRule(id,btn){if(!confirm('Delete/deactivate this policy basis?'))return;await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Deleted',toast:'Policy deleted.'},async()=>{const r=await sb.from('vscore_policy_rules').update({is_active:false,updated_by:S.profile.id,updated_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;await auditEvent('Policy basis deleted','vscore_policy_rules',id)},async()=>{await loadData();renderPage()})}

function formCats(){return ['KITCHEN FORMS','FRONT FORMS','HR FORMS','ACCOUNTING FORMS','MARKETING FORMS']}
function formsPage(){const canEdit=isManager();const cats=formCats();return `<div class="grid two">${canEdit?`<div class="card"><h3>Upload Company Form</h3><p class="muted">Upload picture/image of forms. Staff can view, zoom, print, and download.</p><form id="formLibForm"><div class="field"><label>Form Category</label><select id="formCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="field"><label>Form Title</label><input id="formTitle" class="input" placeholder="Example: Ingredient Request Form" required></div><div class="field"><label>Description / Use</label><textarea id="formDesc" placeholder="When and how to use this form"></textarea></div><div class="field"><label>Form Image / Attachment</label><input id="formFile" type="file" accept="image/*" class="input" required></div><button class="btn green full">Upload Form</button></form></div>`:''}<div class="card"><h3>Available Forms</h3><p class="muted">All staff can access these forms. Click preview to zoom.</p>${formsLibrary()}</div></div>`}
function formsLibrary(){const cats=formCats();return cats.map(cat=>{const items=S.forms.filter(f=>String(f.category||'').toUpperCase()===cat);return `<div class="notice" style="margin-bottom:12px"><h3>${esc(cat)}</h3>${items.length?items.map(formCard).join(''):'<div class="empty">No forms uploaded yet.</div>'}</div>`}).join('')}
function formCard(f){const canEdit=isManager();return `<div style="background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;margin:10px 0"><div class="split" style="justify-content:space-between;align-items:flex-start"><div><b>${esc(f.title)}</b><br><span class="small muted">${esc(f.description||'')}</span><br><span class="small muted">Uploaded: ${fmt(f.created_at)}</span></div>${img(f.file_url)}</div><div class="split" style="margin-top:10px"><button class="btn sm blue" onclick="zoom('${esc(f.file_url||'')}')">Zoom View</button><button class="btn sm ghost" onclick="printUrl('${esc(f.file_url||'')}')">Print</button><button class="btn sm green" onclick="downloadUrl('${esc(f.file_url||'')}','${esc((f.title||'vscore-form').replace(/[^a-z0-9_-]/gi,'_'))}.jpg')">Download</button>${canEdit?`<button class="btn sm yellow editForm" data-id="${f.id}">Update</button> <button class="btn sm dark delForm" data-id="${f.id}">Delete</button>`:''}</div></div>`}
async function createFormItem(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Uploading...',success:'Uploaded',reset:'Upload Another Form',toast:'Form uploaded.'},async()=>{const file=$('#formFile').files[0];if(!file)throw new Error('Please choose a form image.');const im=await imageData(file,1300);const r=await sb.from('vscore_forms').insert({category:$('#formCat').value,title:$('#formTitle').value,description:$('#formDesc').value,file_url:im,file_name:file.name,is_active:true,created_by:S.profile.id,created_at:new Date().toISOString()});if(r.error)throw r.error;await auditEvent('Form uploaded','vscore_forms',$('#formTitle').value)},async()=>{await loadData();renderPage()})}
function editFormItem(id){const f=S.forms.find(x=>x.id===id);if(!f)return;modal(`<h2>Update Form</h2><div class="field"><label>Category</label><select id="efCat">${formCats().map(c=>`<option ${c===f.category?'selected':''}>${c}</option>`).join('')}</select></div><div class="field"><label>Title</label><input id="efTitle" class="input" value="${esc(f.title)}"></div><div class="field"><label>Description</label><textarea id="efDesc">${esc(f.description||'')}</textarea></div><div class="field"><label>Replace Form Image (optional)</label><input id="efFile" type="file" accept="image/*" class="input"></div><button id="saveFormEdit" class="btn green">Save Changes</button> <button class="btn dark" onclick="closeModal()">Close</button>`);$('#saveFormEdit').onclick=e=>act(e.currentTarget,{busy:'Saving...',success:'Saved',reset:'Save Changes',toast:'Form updated.'},async()=>{const patch={category:$('#efCat').value,title:$('#efTitle').value,description:$('#efDesc').value,updated_by:S.profile.id,updated_at:new Date().toISOString()};const file=$('#efFile').files[0];if(file){patch.file_url=await imageData(file,1300);patch.file_name=file.name}const r=await sb.from('vscore_forms').update(patch).eq('id',id);if(r.error)throw r.error;await auditEvent('Form updated','vscore_forms',id)},async()=>{closeModal();await loadData();renderPage()})}
async function deleteFormItem(id,btn){if(!confirm('Delete/deactivate this form from staff library?'))return;await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Deleted',toast:'Form deleted.'},async()=>{const r=await sb.from('vscore_forms').update({is_active:false,updated_by:S.profile.id,updated_at:new Date().toISOString()}).eq('id',id);if(r.error)throw r.error;await auditEvent('Form deleted','vscore_forms',id)},async()=>{await loadData();renderPage()})}

function auditPage(){return `<div class="card"><h3>Audit Trail</h3><p class="muted">Management view of system actions: policy changes, FSQA, violations, mission controls, account actions, and point changes.</p><table><thead><tr><th>Date</th><th>Action</th><th>Module</th><th>User</th><th>Details</th></tr></thead><tbody>${S.audits.map(a=>`<tr><td>${fmt(a.created_at)}</td><td>${esc(a.action)}</td><td>${esc(a.table_name||a.module||'')}</td><td>${esc(emp(a.changed_by||a.created_by).full_name||a.changed_by||a.created_by||'-')}</td><td>${esc(a.details||'')}</td></tr>`).join('')||'<tr><td colspan="5"><div class="empty">No audit logs yet.</div></td></tr>'}</tbody></table></div>`}
async function auditEvent(action,module,details){try{await sb.from('audit_trail').insert({action,table_name:module,changed_by:S.profile?.id||null,details:String(details||''),created_at:new Date().toISOString()})}catch(e){console.warn('audit log skipped',e.message)}}
function recordsPage(){const id=S.profile.id;return `<div class="grid two"><div class="card"><h3>Ledger</h3>${ledgerTable(S.ledger.filter(l=>l.employee_id===id))}</div><div class="card"><h3>Achievements</h3>${achTable(S.achievements.filter(a=>a.employee_id===id),false)}</div></div>`}
function ledgerTable(arr){return `<table><thead><tr><th>Points</th><th>Reason</th><th>Date</th></tr></thead><tbody>${arr.map(l=>`<tr><td><b>${Number(l.points_change)>0?'+':''}${money(l.points_change)}</b></td><td>${esc(l.reason)}</td><td>${fmt(l.created_at)}</td></tr>`).join('')||'<tr><td colspan="3"><div class="empty">No ledger yet.</div></td></tr>'}</tbody></table>`}
function memosPage(){return isManager()?`<div class="grid two"><div class="card"><h3>Publish Memo</h3><form id="memoForm"><div class="field"><label>Title</label><input id="memoTitle" class="input" required></div><div class="field"><label>Content</label><textarea id="memoContent" required></textarea></div><div class="field"><label>Picture / Attachment</label><input id="memoFile" type="file" accept="image/*" class="input"></div><div class="field"><label>Validity Days</label><input id="memoDays" type="number" min="1" max="30" value="7" class="input"></div><button class="btn yellow full">Publish Memo</button></form></div><div class="card"><h3>Memo Summary</h3>${memoList()}</div></div>`:`<div class="card"><h3>My Memos</h3>${memoList()}</div>`}
function memoList(){return S.memos.map(m=>{const c=S.allAcks.filter(a=>a.memo_id===m.id).length;return `<div class="notice" style="margin-bottom:10px"><b>${esc(m.title)}</b><p>${esc(m.content)}</p>${img(m.attachment_url)}<br><span class="small">Valid ${m.validity_days||7} days · ${fmt(m.created_at)}</span><br>${isManager()?`<button class="btn sm ghost memoAcks" data-id="${m.id}">${c} acknowledged — View Names</button> <button class="btn sm dark delMemo" data-id="${m.id}">Delete Memo</button>`:S.acks.find(a=>a.memo_id===m.id)?'<span class="pill green">Acknowledged</span>':`<button class="btn sm yellow ackMemo" data-id="${m.id}">Acknowledge</button>`}</div>`}).join('')||'<div class="empty">No memos.</div>'}
async function createMemo(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Publishing...',success:'Published',reset:'Publish Another Memo',toast:'Memo published.'},async()=>{const days=Number($('#memoDays').value||7),file=$('#memoFile').files[0],att=file?await imageData(file,1200):'';const r=await sb.from('memos').insert({title:$('#memoTitle').value,content:$('#memoContent').value,validity_days:days,expires_at:new Date(Date.now()+days*86400000).toISOString(),attachment_url:att,attachment_name:file?.name||'',is_required:true,published_by:S.profile.id});if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
async function deleteMemo(id,btn){if(!confirm('Delete this memo from active memo list?'))return;await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Deleted',toast:'Memo deleted.'},async()=>{const r=await sb.from('memos').update({is_active:false,is_required:false}).eq('id',id);if(r.error)throw r.error},async()=>{await loadData();renderPage()})}
async function ackMemo(id,btn){await act(btn,{busy:'Acknowledging...',success:'Acknowledged',reset:'Acknowledged',toast:'Memo acknowledged.'},async()=>{const r=await sb.from('memo_acknowledgments').upsert({memo_id:id,employee_id:S.profile.id,acknowledged_at:new Date().toISOString()},{onConflict:'memo_id,employee_id'});if(r.error)throw r.error},async()=>{document.getElementById('memoLock')?.remove();await loadData();renderPage()})}
function showMemoAcks(id){const m=S.memos.find(x=>x.id===id);const rows=S.allAcks.filter(a=>a.memo_id===id).map(a=>`<tr><td>${esc(emp(a.employee_id).full_name)}</td><td>${esc(emp(a.employee_id).branch)}</td><td>${fmt(a.acknowledged_at)}</td></tr>`).join('');modal(`<h2>Memo Acknowledgments</h2><h3>${esc(m?.title||'')}</h3><table><thead><tr><th>Name</th><th>Branch</th><th>Date</th></tr></thead><tbody>${rows||'<tr><td colspan="3"><div class="empty">No acknowledgments yet.</div></td></tr>'}</tbody></table><button class="btn dark" onclick="closeModal()">Close</button>`)}
function activeMemos(){const now=Date.now();return S.memos.filter(m=>m.is_required!==false&&(!m.expires_at||new Date(m.expires_at).getTime()>now))}
function showMemoLock(){if(isOwner())return;document.getElementById('memoLock')?.remove();const m=activeMemos().find(x=>!S.acks.find(a=>a.memo_id===x.id));if(!m)return;document.body.insertAdjacentHTML('beforeend',`<div id="memoLock" class="modal"><div class="modal-card" style="max-width:700px"><div class="notice"><h2>Mandatory Memo</h2><h3>${esc(m.title)}</h3><p>${esc(m.content)}</p>${img(m.attachment_url)}<p class="small">Please acknowledge to continue using dashboard.</p><button class="btn yellow full" id="lockAck">I Have Read and Acknowledge This Memo</button></div></div></div>`);$('#lockAck').onclick=e=>ackMemo(m.id,e.currentTarget)}
function rewardsPage(){return `<div class="grid ${isOwner()?'two':''}">${isOwner()?`<div class="card"><h3>Add Reward</h3><form id="rewardForm"><div class="field"><label>Reward Name</label><input id="rewardTitle" class="input" required></div><div class="field"><label>Details</label><textarea id="rewardDetails" required></textarea></div><div class="field"><label>Requirement</label><textarea id="rewardReq" required></textarea></div><div class="field"><label>Image</label><input id="rewardFile" type="file" accept="image/*" class="input"></div><button class="btn green full">Upload Reward</button></form></div>`:''}<div class="card"><h3>Rewards Waiting for You</h3><div class="grid three">${S.rewards.map(r=>`<div class="notice">${img(r.image_url,'thumb')}<h3>${esc(r.title)}</h3><p>${esc(r.details||'')}</p><b>Achieve Me:</b><br>${esc(r.requirement||'')}${isOwner()?`<br><br><button class="btn sm dark delReward" data-id="${r.id}">Delete Reward</button>`:''}</div>`).join('')||'<div class="empty">No rewards yet.</div>'}</div></div></div>`}
async function createReward(e){e.preventDefault();const b=e.submitter;await act(b,{busy:'Uploading...',success:'Uploaded',reset:'Upload Another Reward',toast:'Reward uploaded.'},async()=>{const file=$('#rewardFile').files[0],im=file?await imageData(file):'';const r=await sb.from('vscore_rewards').insert({title:$('#rewardTitle').value,details:$('#rewardDetails').value,requirement:$('#rewardReq').value,image_url:im,created_by:S.profile.id,is_active:true});if(r.error)throw r.error},async()=>{await loadData();renderPage()})}

function isTasklist(t){return String(t.source_type||t.task_type||'').toLowerCase().includes('tasklist')||String(t.source_type||'').toLowerCase()==='self_tasklist'}
function isMission(t){return !isTasklist(t)}
function notExpiredTasklist(t){const d=new Date(t.created_at||t.submitted_at||Date.now()).getTime();return Date.now()-d<=259200000}
async function purgeOldTasklists(){try{const cutoff=new Date(Date.now()-259200000).toISOString();await sb.from('vscore_tasks').delete().eq('source_type','self_tasklist').lt('created_at',cutoff)}catch(e){console.warn('tasklist purge skipped',e.message)}}

missionsPage=function(){const manage=isManager();const selectable=S.employees.filter(e=>e.id!==S.profile.id);const missions=(S.tasks||[]).filter(isMission);return `<div class="grid two">${manage?`<div class="card"><h3>Assign Special Mission</h3><p class="muted">Mission = V-Points after proof and approval. Tasklist monitoring is separate.</p><form id="missionForm"><div class="field"><label>Mission Target</label><select id="missionScope"><option value="individual">One Employee</option>${isOwner()?'<option value="all_managers">All Managers / Team Leaders Nationwide</option><option value="all_employees">All Active Employees Nationwide</option><option value="branch_all">All Users in Selected Branch</option>':'<option value="branch_staff">All Active Users in My Branch</option>'}</select></div><div class="field"><label>Assign To</label><select id="missionTo">${selectable.map(e=>`<option value="${e.id}">${esc(e.full_name)} - ${esc(e.branch)}</option>`).join('')}</select></div>${isOwner()?`<div class="field"><label>Branch for Branch-Wide</label>${branchSelect('missionBranch',S.profile.branch)}</div>`:''}<div class="field"><label>Mission Title</label><input id="missionTitle" class="input" required></div><div class="field"><label>Mission Checklist</label><textarea id="missionItems" required></textarea></div><div class="grid two"><div class="field"><label>Merit Points</label><input id="missionPts" type="number" step="0.01" value="2" class="input"></div><div class="field"><label>Due Date</label><input id="missionDue" type="datetime-local" class="input"></div></div><button class="btn orange full">Assign Mission</button></form></div>`:''}<div class="card"><h3>${manage?'Mission Monitoring':'My Missions'}</h3>${taskTable(manage?missions:missions.filter(t=>t.assigned_to_employee_id===S.profile.id),manage)}</div></div>`}

function fileData(file,max=1200){
  if(!file)return Promise.resolve('');
  if(String(file.type||'').startsWith('image/')) return imageData(file,max);
  return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=e=>res(e.target.result);rd.onerror=rej;rd.readAsDataURL(file)});
}
function youtubeEmbed(url){
  url=String(url||'').trim(); if(!url)return '';
  try{
    const u=new URL(url);
    let id='';
    if(u.hostname.includes('youtu.be')) id=u.pathname.replace('/','');
    if(u.hostname.includes('youtube.com')) id=u.searchParams.get('v') || (u.pathname.includes('/embed/')?u.pathname.split('/embed/')[1]:'');
    if(id) return 'https://www.youtube.com/embed/'+id.split(/[?&]/)[0];
  }catch(e){}
  return url;
}

function isPptxFile(fileOrName){
  const name=String(fileOrName?.name||fileOrName||'').toLowerCase();
  const type=String(fileOrName?.type||'').toLowerCase();
  return name.endsWith('.pptx') || type.includes('presentationml');
}
function isPptFile(fileOrName){
  const name=String(fileOrName?.name||fileOrName||'').toLowerCase();
  return name.endsWith('.ppt') && !name.endsWith('.pptx');
}
function slideNumber(path){const m=String(path).match(/slide(\d+)\.xml$/);return m?Number(m[1]):0}
function emu(v){return Number(v||0)}
function hexColor(v){v=String(v||'').replace('#','');return /^[0-9a-fA-F]{6}$/.test(v)?('#'+v):''}
function normalizePptTarget(slidePath,target){
  if(!target)return '';
  if(target.startsWith('/')) return target.replace(/^\//,'');
  const base=slidePath.split('/').slice(0,-1).join('/');
  const parts=(base+'/'+target).split('/'); const out=[];
  for(const part of parts){ if(!part||part==='.')continue; if(part==='..')out.pop(); else out.push(part); }
  return out.join('/');
}
function mimeFromName(name){
  name=String(name||'').toLowerCase();
  if(name.endsWith('.png'))return 'image/png'; if(name.endsWith('.gif'))return 'image/gif'; if(name.endsWith('.webp'))return 'image/webp'; if(name.endsWith('.svg'))return 'image/svg+xml'; return 'image/jpeg';
}
async function zipFileToDataUrl(zip,path){
  const f=zip.file(path); if(!f)return '';
  const b64=await f.async('base64'); return `data:${mimeFromName(path)};base64,${b64}`;
}
function nodeText(el){return Array.from(el?.getElementsByTagName('a:t')||[]).map(n=>n.textContent||'').join(' ').trim()}
function firstTag(el,name){return (el?.getElementsByTagName(name)||[])[0]||null}
function xfrmBox(el,slideW,slideH){
  const xfrm=firstTag(el,'a:xfrm')||firstTag(el,'p:xfrm');
  const off=firstTag(xfrm,'a:off'), ext=firstTag(xfrm,'a:ext');
  const x=emu(off?.getAttribute('x')), y=emu(off?.getAttribute('y')), cx=emu(ext?.getAttribute('cx')), cy=emu(ext?.getAttribute('cy'));
  if(!cx||!cy)return null;
  return {left:x/slideW*100, top:y/slideH*100, width:cx/slideW*100, height:cy/slideH*100};
}
function textStyle(el){
  const rPr=firstTag(el,'a:rPr'); const pPr=firstTag(el,'a:pPr');
  const sz=Number(rPr?.getAttribute('sz')||pPr?.getAttribute('defSz')||0);
  const fontPx=sz?Math.max(10,Math.round(sz/100*1.333)):18;
  const clr=firstTag(rPr,'a:srgbClr')||firstTag(pPr,'a:srgbClr');
  return {fontPx,color:hexColor(clr?.getAttribute('val'))||'#111827',bold:rPr?.getAttribute('b')==='1'};
}
function relMapForSlide(parser,zip,slidePath){
  return (async()=>{
    const relPath=slidePath.replace('ppt/slides/','ppt/slides/_rels/')+'.rels'; const relFile=zip.file(relPath); const map={};
    if(!relFile)return map;
    const relDoc=parser.parseFromString(await relFile.async('text'),'application/xml');
    Array.from(relDoc.getElementsByTagName('Relationship')).forEach(r=>{map[r.getAttribute('Id')]={type:r.getAttribute('Type')||'',target:normalizePptTarget(slidePath,r.getAttribute('Target'))};});
    return map;
  })();
}
async function pptxToSlidesFromArrayBuffer(buffer){
  if(!window.JSZip) throw new Error('PowerPoint viewer library did not load. Please check internet connection and try again.');
  const zip=await JSZip.loadAsync(buffer); const parser=new DOMParser();
  let slideW=12192000, slideH=6858000;
  const pres=zip.file('ppt/presentation.xml');
  if(pres){try{const pdoc=parser.parseFromString(await pres.async('text'),'application/xml');const sz=firstTag(pdoc,'p:sldSz');slideW=emu(sz?.getAttribute('cx'))||slideW;slideH=emu(sz?.getAttribute('cy'))||slideH;}catch(e){}}
  const slideFiles=Object.keys(zip.files).filter(x=>/^ppt\/slides\/slide\d+\.xml$/.test(x)).sort((a,b)=>slideNumber(a)-slideNumber(b));
  const slides=[];
  for(let i=0;i<slideFiles.length;i++){
    const slidePath=slideFiles[i]; const xml=await zip.file(slidePath).async('text'); const doc=parser.parseFromString(xml,'application/xml'); const rels=await relMapForSlide(parser,zip,slidePath);
    const elements=[]; const allTexts=[];
    for(const pic of Array.from(doc.getElementsByTagName('p:pic'))){
      const blip=firstTag(pic,'a:blip'); const rid=blip?.getAttribute('r:embed')||blip?.getAttribute('embed')||blip?.getAttributeNS('http://schemas.openxmlformats.org/officeDocument/2006/relationships','embed');
      const target=rels[rid]?.target; const box=xfrmBox(pic,slideW,slideH);
      if(target&&box){const data=await zipFileToDataUrl(zip,target); if(data)elements.push({type:'image',src:data,...box});}
    }
    for(const sp of Array.from(doc.getElementsByTagName('p:sp'))){
      const txt=Array.from(sp.getElementsByTagName('a:p')).map(p=>Array.from(p.getElementsByTagName('a:t')).map(n=>n.textContent||'').join('')).filter(Boolean).join('\n').trim();
      if(!txt)continue; allTexts.push(...txt.split(/\n+/).filter(Boolean));
      const box=xfrmBox(sp,slideW,slideH) || {left:8,top:12+(elements.length%4)*12,width:84,height:18};
      const st=textStyle(sp); elements.push({type:'text',text:txt,...box,fontPx:st.fontPx,color:st.color,bold:st.bold});
    }
    const title=allTexts[0]||`PowerPoint Slide ${i+1}`;
    const content=(allTexts.length>1?allTexts.slice(1).join('\n'):allTexts.join('\n')) || 'Review this PowerPoint slide.';
    slides.push({slide_no:i+1,title,content,image_url:'',layout_json:JSON.stringify({slideW,slideH,elements}),is_active:true});
  }
  return slides.length?slides:[{slide_no:1,title:'PowerPoint Training',content:'PowerPoint file attached. Download the file if slide preview is not available.',is_active:true}];
}
async function pptxToSlidesFromFile(file){
  if(!file) return [];
  if(isPptFile(file)) throw new Error('Old .ppt files cannot be previewed in-browser. Please save/export it as .pptx or PDF, then upload again.');
  if(!isPptxFile(file)) return [];
  if(file.size>20*1024*1024) throw new Error('PowerPoint is too large for browser preview. Please compress it, export to PDF, or upload slide images.');
  return pptxToSlidesFromArrayBuffer(await file.arrayBuffer());
}
async function pptxToSlidesFromDataUrl(dataUrl){const buffer=await (await fetch(dataUrl)).arrayBuffer(); return pptxToSlidesFromArrayBuffer(buffer);}
function parseLayout(slide){try{return typeof slide.layout_json==='string'?JSON.parse(slide.layout_json):(slide.layout_json||null)}catch(e){return null}}
function renderPptCanvas(slide){
  const lay=parseLayout(slide); if(!lay||!Array.isArray(lay.elements)||!lay.elements.length)return '';
  const els=lay.elements.map(el=>{
    const pos=`left:${Math.max(0,el.left||0)}%;top:${Math.max(0,el.top||0)}%;width:${Math.max(.5,el.width||20)}%;height:${Math.max(.5,el.height||10)}%;`;
    if(el.type==='image')return `<img class="ppt-layer-img" src="${esc(el.src)}" style="${pos}" onclick="zoom('${esc(el.src)}')">`;
    const fs=Math.max(10,Math.min(46,Number(el.fontPx||18)));
    return `<div class="ppt-layer-text" style="${pos}font-size:clamp(11px,${(fs/18).toFixed(2)}vw,${fs}px);color:${esc(el.color||'#111827')};font-weight:${el.bold?'900':'500'}">${esc(el.text||'').replace(/\n/g,'<br>')}</div>`;
  }).join('');
  return `<div class="ppt-canvas">${els}</div>`;
}
function pptSlideViewerHtml(m,slides,idx=0){
  const total=Math.max(1,slides.length); idx=Math.max(0,Math.min(total-1,idx)); const s=slides[idx]||{};
  const visual=renderPptCanvas(s);

async function serverStamp(){
  try{const r=await sb.rpc('vscore_server_stamp'); if(!r.error&&r.data) return r.data;}catch(e){}
  return new Intl.DateTimeFormat('en-PH',{timeZone:'Asia/Manila',dateStyle:'medium',timeStyle:'medium'}).format(new Date())+' PH/SGT';
}
async function getGeo(){return new Promise(res=>{if(!navigator.geolocation)return res('Location unavailable');navigator.geolocation.getCurrentPosition(p=>res(p.coords.latitude.toFixed(5)+','+p.coords.longitude.toFixed(5)),()=>res('Location not allowed'),{timeout:3500,enableHighAccuracy:true})})}
imageData = async function(file,max=960){
  if(!file)return '';
  const stamp=await serverStamp(); const geo=await getGeo();
  return new Promise((res,rej)=>{const rd=new FileReader();rd.onload=e=>{const im=new Image();im.onload=()=>{let w=im.width,h=im.height,scale=Math.min(1,max/Math.max(w,h));const c=document.createElement('canvas');c.width=Math.round(w*scale);c.height=Math.round(h*scale);const ctx=c.getContext('2d');ctx.drawImage(im,0,0,c.width,c.height);const bar=Math.max(24,Math.round(c.height*.045));ctx.fillStyle='rgba(0,0,0,.58)';ctx.fillRect(0,c.height-bar,c.width,bar);ctx.fillStyle='#fff';ctx.font=`${Math.max(10,Math.round(bar*.42))}px Arial`;ctx.textBaseline='middle';ctx.fillText(`V-SCORE • ${stamp} • ${geo}`,8,c.height-bar/2);res(c.toDataURL('image/jpeg',0.58))};im.onerror=rej;im.src=e.target.result};rd.onerror=rej;rd.readAsDataURL(file)})
}

function reactionSummary(postId){

postCard=function(p,kind='news'){
  const author=emp(p.created_by)||{};const photos=parsePhotos(p.photos_json);const comm=(S.newsComments||[]).filter(c=>c.post_id===p.id&&!c.parent_comment_id);const canComment=commentsAllowed(p);const rx=reactionSummary(p.id);const canDelete=p.created_by===S.profile.id||isOwner();

  <div class="fb-comments">${comm.map(c=>commentHtml(c,p.id)).join('')}</div></div>`;

function expiresText(p){const exp=p.expires_at?new Date(p.expires_at).getTime():new Date(p.created_at).getTime()+86400000;const ms=exp-Date.now();if(ms<=0)return 'soon';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return h?`${h}h ${m}m`:`${m}m`}

async function createMeritCelebration(employeeId,pts,reason,sourceType,sourceId){

  if(!employeeId||points<=0)return;
  const empName=rec.full_name||'Ka-Varda';
  const caption=`🎉 Congratulations ${empName}! Your V-Points increased by +${money(points)}. Keep going, Ka-Varda! Every effort, mission, and achievement makes the team stronger. 🌟`;
  const message=`Congratulations! Your merit was approved and your V-Points increased by +${money(points)}. Do more, Ka-Varda — your effort is seen and appreciated!`;
  try{
    const nr=await sb.from('vscore_notifications').insert({employee_id:employeeId,title:'🎉 Merit Approved!',message,type:'merit_approved',source_type:sourceType,source_id:sourceId,points:points,created_by:S.profile.id,is_active:true});
    if(nr.error)console.warn('Notification skipped:',nr.error.message);
  }catch(e){console.warn('Notification skipped:',e.message)}
  try{
    const post={post_type:'news',caption,photos_json:'[]',created_by:S.profile.id,branch:rec.branch||S.profile.branch,share_scope:'all',comments_enabled:true,expires_at:new Date(Date.now()+86400000).toISOString(),is_active:true};

    if(pr.error)console.warn('Auto news feed post skipped:',pr.error.message);
  }catch(e){console.warn('Auto news feed post skipped:',e.message)}
  try{await auditEvent('Merit celebration posted','vscore_notifications',`${empName} +${money(points)}: ${reason}`)}catch(e){}
}

function todayRange(){const d=new Date();d.setHours(0,0,0,0);const end=new Date(d);end.setDate(end.getDate()+1);return [d,end]}

function inRange(dt,s,e){if(!dt)return false;const t=new Date(dt);return t>=s&&t<e}
function activeEmployees(){return (S.employees||[]).filter(e=>e.is_active!==false&&String(e.activation_status||'').toLowerCase()!=='deleted')}
function employeePoints(e){return Number(e?.current_points||100)}
function pendingMemosCount(){return (S.memos||[]).filter(m=>m.is_active!==false&&!S.acks?.find(a=>a.memo_id===m.id)).length}
function pendingTrainingsCount(){return (S.trainingModules||[]).filter(m=>!trainingDone(m.id,S.profile?.id)).length}

function branchHealthPage(){
  const branches=[...new Set(activeEmployees().map(e=>e.branch).filter(Boolean))];
  const rows=branches.map(b=>{
    const emps=activeEmployees().filter(e=>e.branch===b);
    const avgPts=emps.length?emps.reduce((s,e)=>s+employeePoints(e),0)/emps.length:0;
    const fs=(S.fsqa||[]).filter(f=>f.branch===b&&f.is_active!==false);
    const fsAvg=fs.length?fs.reduce((s,f)=>s+Number(f.score||f.audit_score||0),0)/fs.length:0;
    const pendingV=(S.violations||[]).filter(v=>v.branch===b&&!['validated','closed / deducted','cancelled','rejected'].includes(String(v.status||'').toLowerCase())).length;
    const doneTasks=(S.tasks||[]).filter(t=>t.branch===b&&['approved','completed'].includes(String(t.status||'').toLowerCase())).length;
    let health=Math.round(Math.max(0,Math.min(100,(avgPts/150*45)+(fsAvg*.35)+Math.min(20,doneTasks*2)-pendingV*4)));
    const status=health>=95?'Healthy / Excellent':health>=90?'Good with Minor Watch':health>=85?'Needs Monitoring':'Needs Branch Recovery';
    return {branch:b,emps:emps.length,avgPts,fsAvg,pendingV,doneTasks,health,status};
  }).sort((a,b)=>b.health-a.health);

function eomPage(){

async function parsePolicyExcel(file){
  if(!file)throw new Error('Choose an Excel file first.');
  const zip=await JSZip.loadAsync(await file.arrayBuffer());
  const parse=txt=>new DOMParser().parseFromString(txt,'application/xml');
  const sst=[];const sstFile=zip.file('xl/sharedStrings.xml');
  if(sstFile){const xml=parse(await sstFile.async('text'));xml.querySelectorAll('si').forEach(si=>{sst.push([...si.querySelectorAll('t')].map(t=>t.textContent).join(''))})}
  const wb=parse(await zip.file('xl/workbook.xml').async('text'));
  const rels=parse(await zip.file('xl/_rels/workbook.xml.rels').async('text'));
  const relMap={};rels.querySelectorAll('Relationship').forEach(r=>relMap[r.getAttribute('Id')]=r.getAttribute('Target'));
  let sheets=[...wb.querySelectorAll('sheet')].map(s=>({name:s.getAttribute('name'),rid:s.getAttribute('r:id')||s.getAttribute('id')}));
  let sh=sheets.find(s=>/app import template/i.test(s.name))||sheets.find(s=>/policy matrix/i.test(s.name))||sheets[0];
  if(!sh)throw new Error('No worksheet found in Excel.');
  let target=relMap[sh.rid]||'worksheets/sheet1.xml';
  if(target.startsWith('/'))target=target.replace(/^\/+/,'');
  if(!target.startsWith('xl/'))target='xl/'+target.replace(/^\.\.\//,'');
  const sheetFile=zip.file(target);if(!sheetFile)throw new Error('Could not read worksheet '+sh.name);
  const sx=parse(await sheetFile.async('text'));
  function colIndex(ref){const m=String(ref||'A').match(/[A-Z]+/i);let n=0;for(const ch of (m?m[0]:'A').toUpperCase()){n=n*26+(ch.charCodeAt(0)-64)}return n-1}
  function cellVal(c){const t=c.getAttribute('t');if(t==='s'){return sst[Number(c.querySelector('v')?.textContent||0)]||''}if(t==='inlineStr'){return [...c.querySelectorAll('t')].map(x=>x.textContent).join('')}const v=c.querySelector('v')?.textContent||'';if(t==='b')return v==='1';return v}
  const rows=[...sx.querySelectorAll('sheetData row')].map(row=>{const out=[];row.querySelectorAll('c').forEach(c=>out[colIndex(c.getAttribute('r'))]=cellVal(c));return out});
  const header=(rows.shift()||[]).map(h=>String(h||'').trim());
  const norm=header.map(normHead);
  const get=(r,names)=>{for(const name of names){const i=norm.indexOf(normHead(name));if(i>=0)return r[i]}return ''};
  return rows.filter(r=>r && r.some(x=>String(x||'').trim())).map(r=>{
    const code=get(r,['policy_code','VARDA ACT #','VARDA ACT','policy code']);
    const title=get(r,['policy_title','Policy Title','Violation / Policy Title','title']);
    const desc=get(r,['Policy Rule / Covered Conduct','description','rule','Description / Rule Meaning']);
    const dept=get(r,['department_owner','Department Owner','category']);
    const sev=get(r,['severity','Severity']);
    const ptsRaw=get(r,['deduction_points','Suggested Demerit Points','Demerit Points','points']);
    let pts=Number(String(ptsRaw).replace(/[^0-9.\-]/g,''));if(!Number.isFinite(pts))pts=0;if(pts>0)pts=-Math.abs(pts);
    const approval=get(r,['approver','Decision / Approval Owner','approval_owner','Points Approver']);
    const evidence=get(r,['evidence_required','Evidence Requirement','evidence']);
    const due=get(r,['Due Process Requirement','due_process_required','Due Process']);
    const action=get(r,['Recommended Corrective Action','recommended_action','Corrective Action Plan']);
    const keywords=get(r,['Search Keywords','keywords']);
    const basis=get(r,['Manual Basis','source','basis']);
    let active=get(r,['is_active','active']);
    active=String(active).toLowerCase()==='false'?false:true;
    return {policy_code:String(code||'').trim(),title:String(title||'').trim(),description:String(desc||'').trim(),department_owner:String(dept||'').trim(),category:String(dept||'').trim(),severity:String(sev||'Minor').trim(),points:pts||0,approval_owner:String(approval||'').trim(),evidence_required:String(evidence||'').trim(),due_process_required:String(due||'').trim(),recommended_action:String(action||'').trim(),keywords:String(keywords||'').trim(),manual_basis:String(basis||'').trim(),source:String(basis||'Excel Policy Matrix').trim(),is_active:active};
  }).filter(r=>r.policy_code||r.title);
}

async function uploadPolicyExcel(e){
  e.preventDefault();const b=e.submitter;await act(b,{busy:'Reading Excel...',success:'Uploaded',reset:'Upload Another Matrix',toast:'Policy matrix synced.'},async()=>{
    const rows=await parsePolicyExcel($('#policyExcelFile').files[0]);if(!rows.length)throw new Error('No valid policy rows found.');
    let inserted=0,updated=0;
    for(const row of rows){
      const payload={...row,created_by:S.profile.id,updated_by:S.profile.id,updated_at:new Date().toISOString()};

loadData = async function(){
  await _v21LoadBase();

    q(sb.from('vscore_training_quiz_attempts').select('*').order('taken_at',{ascending:false}),[])
  ]);

};
function quizQuestions(mid){return (S.trainingQuestions||[]).filter(q=>q.module_id===mid&&q.is_active!==false).sort((a,b)=>(a.sort_order||0)-(b.sort_order||0))}
function quizAttempts(mid,empId=S.profile?.id){return (S.trainingAttempts||[]).filter(a=>a.module_id===mid&&a.employee_id===empId)}
function quizPassed(mid,empId=S.profile?.id){return quizAttempts(mid,empId).some(a=>a.passed===true)}
function quizStatusPill(mid,empId=S.profile?.id){const m=(S.trainingModules||[]).find(x=>x.id===mid); if(!m?.quiz_enabled)return '<span class="pill gray">No Quiz</span>'; return quizPassed(mid,empId)?'<span class="pill green">Quiz Passed ✓</span>':'<span class="pill yellow">Quiz Required</span>'}
function parseQuizText(text){
  const blocks=String(text||'').split(/\n\s*---\s*\n/g).map(x=>x.trim()).filter(Boolean);
  const rows=[];
  blocks.forEach((block,i)=>{
    const lines=block.split(/\n+/).map(x=>x.trim()).filter(Boolean);
    const qLine=lines.find(l=>/^Q[:.)-]/i.test(l)) || lines[0] || '';
    const get=(letter)=>{const re=new RegExp('^'+letter+'[\\)\\.:-]\\s*(.*)$','i'); const line=lines.find(l=>re.test(l)); return line?line.replace(re,'$1').trim():''};
    const ansLine=lines.find(l=>/^(answer|ans)[:.)-]/i.test(l))||'';
    const expLine=lines.find(l=>/^(explanation|why)[:.)-]/i.test(l))||'';
    const ans=(ansLine.replace(/^(answer|ans)[:.)-]\s*/i,'').trim().charAt(0)||'A').toUpperCase();
    const question=qLine.replace(/^Q[:.)-]\s*/i,'').trim();
    if(question){rows.push({question_text:question,option_a:get('A'),option_b:get('B'),option_c:get('C'),option_d:get('D'),correct_answer:['A','B','C','D'].includes(ans)?ans:'A',explanation:expLine.replace(/^(explanation|why)[:.)-]\s*/i,'').trim(),sort_order:i+1,is_active:true});}
  });
  return rows;
}

/* ================= V22 SAFE FORMS + TRAINING PASS FEED PATCH =================
   Purpose:
   - Stop background refresh from wiping forms while managers are typing.
   - Keep drafts for text/select fields if a page re-renders.
   - Refresh only when safe or after successful submit.
   - Post quiz pass celebration to VARDA News Feed (public recognition only, no private data).
*/
(function(){
  const V22 = window.V22SafeForms || (window.V22SafeForms = {});
  V22.version = 'V22 Stable Forms + Training Pass Feed';
  V22.lastSafeRefreshAt = 0;

  function isEditableElement(el){
    if(!el) return false;
    const tag=(el.tagName||'').toUpperCase();
    return tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT' || el.isContentEditable;
  }
  function openModalExists(){ return !!document.querySelector('.modal'); }
  function dirtyForms(){ return Array.from(document.querySelectorAll('form[data-v22-dirty="true"]')); }
  function hasUnsavedInput(){
    const active=document.activeElement;
    if(isEditableElement(active)) return true;
    if(openModalExists()) return true;
    if(dirtyForms().length) return true;
    return false;
  }
  function formKey(form){
    const id=form.id || form.getAttribute('name') || 'form';
    const tab=S?.tab || 'main';
    const uid=S?.profile?.id || 'public';
    return `vscore_v22_draft_${uid}_${tab}_${id}`;
  }
  function readForm(form){
    const data={};
    form.querySelectorAll('input,textarea,select').forEach(el=>{
      if(!el.id && !el.name) return;
      if((el.type||'').toLowerCase()==='file') return;
      const k=el.id || el.name;
      if((el.type||'').toLowerCase()==='checkbox') data[k]=!!el.checked;
      else if((el.type||'').toLowerCase()==='radio') { if(el.checked) data[k]=el.value; }
      else data[k]=el.value;
    });
    return data;
  }
  function writeForm(form,data){
    if(!data || typeof data!=='object') return;
    form.querySelectorAll('input,textarea,select').forEach(el=>{
      if(!el.id && !el.name) return;
      if((el.type||'').toLowerCase()==='file') return;
      const k=el.id || el.name;
      if(!(k in data)) return;
      if((el.type||'').toLowerCase()==='checkbox') el.checked=!!data[k];
      else if((el.type||'').toLowerCase()==='radio') el.checked=String(el.value)===String(data[k]);
      else el.value=data[k];
    });
  }
  function saveDraft(form){
    try{ localStorage.setItem(formKey(form), JSON.stringify(readForm(form))); }catch(e){}
  }
  function restoreDraft(form){
    try{
      const raw=localStorage.getItem(formKey(form));
      if(!raw) return;
      const data=JSON.parse(raw);
      writeForm(form,data);
      form.dataset.v22Restored='true';
    }catch(e){}
  }
  function clearDraft(form){
    try{ localStorage.removeItem(formKey(form)); }catch(e){}
    form.dataset.v22Dirty='false';
  }
  window.v22ClearAllDraftsForPage=function(){
    document.querySelectorAll('form').forEach(clearDraft);
  };
  function bindDraftProtection(root=document){
    root.querySelectorAll('form').forEach(form=>{
      if(form.dataset.v22Protected==='true') return;
      restoreDraft(form);
      form.dataset.v22Protected='true';
      form.addEventListener('input',()=>{form.dataset.v22Dirty='true';saveDraft(form);},true);
      form.addEventListener('change',()=>{form.dataset.v22Dirty='true';saveDraft(form);},true);
      form.addEventListener('submit',()=>{
        // Keep the draft for a few seconds; if submit succeeds, page re-renders and this form disappears.
        // If submit fails, the user's typing is still saved and restored.
        setTimeout(()=>{ if(!document.body.contains(form)) clearDraft(form); },3500);
      },true);
    });
  }
  window.v22BindDraftProtection=bindDraftProtection;
  window.v22HasUnsavedInput=hasUnsavedInput;

  async function safeBackgroundRefresh(forceRender=false){
    if(!S?.profile || document.hidden) return;
    if(!forceRender && hasUnsavedInput()){
      // Do not touch UI while someone is typing/filling a form/modal.
      return;
    }
    await loadData();
    V22.lastSafeRefreshAt=Date.now();
    if(forceRender || !hasUnsavedInput()){
      renderPage();
      if(document.getElementById('chatPanel')?.classList.contains('open')) renderChatBody();
    }
  }
  window.v22SafeBackgroundRefresh=safeBackgroundRefresh;

  // Wrap renderPage so every page/form gets draft protection and safe refresh buttons.
  const _v22RenderPagePrev = renderPage;
  renderPage = function(){
    _v22RenderPagePrev();
    bindDraftProtection(document);
    const pageRef=document.getElementById('pageRef');
    if(pageRef){
      pageRef.onclick=async e=>{
        if(hasUnsavedInput() && !confirm('You have unsaved typing on this page. Refreshing may reset the form. Continue?')) return;
        await act(e.currentTarget,{busy:'Refreshing...',success:'Updated',reset:'Refresh This Page',toast:'Page updated.'},async()=>loadData(),()=>renderPage());
      };
    }
  };

  // Wrap renderApp so the old fast 20-second auto-refresh is replaced by a safe refresh.
  const _v22RenderAppPrev = renderApp;
  renderApp = function(){
    _v22RenderAppPrev();
    // Stop V17 auto refresh because it rendered the page every 20 seconds and wiped forms.
    if(window.v17AutoRefresh){
      try{ clearInterval(window.v17AutoRefresh); }catch(e){}
      window.v17AutoRefresh=null;
    }
    if(!window.v22SafeAutoRefresh){
      window.v22SafeAutoRefresh=setInterval(async()=>{
        try{ await safeBackgroundRefresh(false); }catch(e){ console.warn('V22 safe refresh skipped',e); }
      },60000);
    }
    // Sidebar navigation should protect unsaved form inputs.
    $$('[data-tab]').forEach(b=>{
      b.onclick=()=>{
        if(hasUnsavedInput() && !confirm('You have unsaved typing. Leave this page?')) return;
        document.querySelectorAll('form').forEach(clearDraft);
        S.tab=b.dataset.tab==='memory'?'news':b.dataset.tab;
        renderPage();
        safeBackgroundRefresh(true).catch(console.warn);
      };
    });
    const refresh=document.getElementById('refresh');
    if(refresh){
      refresh.onclick=async e=>{
        if(hasUnsavedInput() && !confirm('You have unsaved typing. Refresh all data now?')) return;
        await act(e.currentTarget,{busy:'Refreshing...',success:'Updated',reset:'Refresh Data',toast:'Updated'},async()=>loadData(),()=>renderPage());
      };
    }
    bindDraftProtection(document);
  };

  async function postTrainingPassToNewsFeed(module, score){
    if(!module || !S?.profile) return;
    // Do not post duplicate congratulations if this training was already completed before this pass.
    const alreadyDone = trainingDone(module.id, S.profile.id);
    if(alreadyDone) return;
    try{
      const caption = `🎓 Congratulations, ${S.profile.full_name}! You PASSED the training quiz: ${module.title}. Score: ${score}%. Keep the Ka-Varda standard strong — No Proof, No Point.`;
      const post={
        post_type:'news',
        caption,
        photos_json:'[]',
        created_by:S.profile.id,
        branch:S.profile.branch,
        share_scope:'all',
        comments_enabled:true,
        expires_at:new Date(Date.now()+24*60*60*1000).toISOString(),
        is_active:true
      };
      const r=await sb.from('vscore_social_posts').insert(post);
      if(r.error) throw r.error;
      await auditEvent('Training quiz pass posted to news feed','vscore_social_posts',caption);
    }catch(e){
      console.warn('Training pass news feed post failed',e);
    }
  }
  window.postTrainingPassToNewsFeed=postTrainingPassToNewsFeed;

  // Replace quiz submission with version that posts celebration and keeps all existing features.
  submitTrainingQuiz = async function(e,mid){
    e.preventDefault();
    const btn=document.getElementById('submitQuizBtn');
    const qs=quizQuestions(mid);
    const m=(S.trainingModules||[]).find(x=>x.id===mid);
    let correct=0;
    const answers={};
    for(const q of qs){
      const picked=document.querySelector(`input[name="q_${q.id}"]:checked`);
      if(!picked){ toast('Please answer all quiz questions.','error'); return; }
      answers[q.id]=picked.value;
      if(String(picked.value).toUpperCase()===String(q.correct_answer||'A').toUpperCase()) correct++;
    }
    const score=qs.length?Math.round((correct/qs.length)*100):0;
    const passed=score>=Number(m.passing_score||80);
    const wasAlreadyDone=trainingDone(mid,S.profile.id);
    await act(btn,{busy:'Checking...',success:passed?'Passed ✓':'Retake Needed',reset:passed?'Passed ✓':'Submit Again',toast:passed?'Congrats, you PASS! Training completed.':'Quiz not passed. Please review and retake.'},async()=>{
      const ar=await sb.from('vscore_training_quiz_attempts').insert({module_id:mid,employee_id:S.profile.id,score,total_questions:qs.length,correct_count:correct,passed,passing_score:Number(m.passing_score||80),answers_json:answers,taken_at:new Date().toISOString()});
      if(ar.error) throw ar.error;
      if(passed){
        if(!wasAlreadyDone){ await postTrainingPassToNewsFeed(m,score); }
        const cr=await sb.from('vscore_training_completions').upsert({module_id:mid,employee_id:S.profile.id,status:'completed',completed_at:new Date().toISOString(),last_slide_seen:moduleSlides(mid).length,quiz_score:score},{onConflict:'module_id,employee_id'});
        if(cr.error) throw cr.error;
        if(!wasAlreadyDone && Number(m.quiz_points||0)>0){ await addPoints(S.profile.id,Number(m.quiz_points),'Training quiz passed: '+m.title,'training',mid); }
        await auditEvent('Training quiz passed','vscore_training_quiz_attempts',`${S.profile.full_name} scored ${score}%`);
      }else{
        await auditEvent('Training quiz failed','vscore_training_quiz_attempts',`${S.profile.full_name} scored ${score}%`);
      }
    },async()=>{
      await loadData();
      if(passed){
        modal(`<h2>🎉 Congratulations, Ka-Varda!</h2><div class="notice success"><b>YOU PASS!</b><br><br><b>Score:</b> ${score}%<br><b>Status:</b> Training marked DONE.${!wasAlreadyDone?'<br><b>Recognition:</b> Posted to VARDA News Feed.':''}${Number(m.quiz_points||0)>0&&!wasAlreadyDone?`<br><b>Merit:</b> +${money(m.quiz_points)} V-Points earned.`:''}</div><p class="muted">Keep applying the Varda standard every shift.</p><div class="split"><button class="btn green" onclick="closeModal();renderPage()">Done</button><button class="btn blue" onclick="closeModal();S.tab='news';renderPage()">View News Feed</button></div>`);
      }else{
        modal(`<h2>Quiz Result: Retake Needed</h2><div class="notice danger"><b>Your score:</b> ${score}%<br><b>Passing score:</b> ${money(m.passing_score||80)}%<br>Please review the training and take the quiz again.</div><div class="split"><button class="btn blue" onclick="closeModal();openTraining('${mid}',0)">Review Training</button><button class="btn yellow" onclick="closeModal();openTrainingQuiz('${mid}')">Retake Quiz</button></div>`);

  // Rebind after base bind runs.
