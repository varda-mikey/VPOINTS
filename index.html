      }
      tile.innerHTML=`${media}<div class="file-name"></div><div class="vscore-file-badge">Ready to upload</div>`;
      tile.querySelector('.file-name').textContent=file.name;
      box.appendChild(tile);
    }
  }
  window.v43RenderFilePreview=v43RenderFilePreview;

  function v43SetFileStatus(file,status,text){
    const key=v43FileKey(file);
    document.querySelectorAll(`.vscore-file-tile[data-file-key="${CSS.escape(key)}"]`).forEach(tile=>{
      tile.classList.remove('ready','uploading','done','error');
      tile.classList.add(status||'ready');
      const b=tile.querySelector('.vscore-file-badge');
      if(b) b.textContent=text || (status==='done'?'Uploaded / ready to post':status==='uploading'?'Uploading...':status==='error'?'Upload failed':'Ready to upload');
    });
  }
  window.v43SetFileStatus=v43SetFileStatus;

  document.addEventListener('change',function(e){
    const input=e.target;
    if(input && input.type==='file') v43RenderFilePreview(input);
  },true);

  // Replace the fast bottom popup with inline thumbnail status only.
  window.vscoreUploadShow=function(msg,small){};
  window.vscoreUploadHide=function(){};

  async function v43HiddenDrivePost(payload,timeoutMs=120000){
    if(typeof v36HiddenDriveFormPost==='function') return await v36HiddenDriveFormPost(payload,timeoutMs);
    throw new Error('Company storage bridge post method is missing. Please use V43 index.html.');
  }

  v34DriveUploadDataUrl = async function(dataUrl,file,folder,prefix='vscore'){
    if(!dataUrl) return {ok:true,url:'',viewUrl:'',directViewUrl:'',embedUrl:'',thumbnailUrl:'',fileId:'',fileName:''};
    if(!window.VSCORE_DRIVE_BRIDGE_URL) throw new Error('Company file storage bridge URL is missing.');
    if(file && file.size > window.VSCORE_DRIVE_UPLOAD_MAX_MB*1024*1024) throw new Error(`File is too large. Limit: ${window.VSCORE_DRIVE_UPLOAD_MAX_MB}MB. Please compress or use a secure link.`);
    try{
      if(file) v43SetFileStatus(file,'uploading','Uploading...');
      const payload={
        folder: folder || (typeof v34CurrentDriveFolder==='function'?v34CurrentDriveFolder():'09 General Uploads'),
        fileName: v43SafeFileName(file,prefix),
        mimeType: (file && file.type) || (String(dataUrl).match(/^data:([^;]+)/)?.[1]) || 'application/octet-stream',
        base64: v43StripDataUrl(dataUrl),
        uploadedBy: window.S?.profile?.full_name || '',
        employeeId: window.S?.profile?.id || '',
        branch: window.S?.profile?.branch || '',
        app: 'V-SCORE'
      };
      const res=await v43HiddenDrivePost(payload);
      if(!res.ok) throw new Error(res.error||'Upload failed.');
      if(file) v43SetFileStatus(file,'done','Uploaded / ready to post');
      return res;
    }catch(err){
      if(file) v43SetFileStatus(file,'error','Upload failed');
      throw err;
    }
  };
  window.v34DriveUploadDataUrl=v34DriveUploadDataUrl;

  v34DriveUploadFile = async function(file,folder,prefix='vscore'){
    if(!file) return {ok:true,url:'',viewUrl:'',directViewUrl:'',embedUrl:'',thumbnailUrl:'',fileId:'',fileName:''};
    const dataUrl=await v43ReadFileDataUrl(file);
    return await v34DriveUploadDataUrl(dataUrl,file,folder,prefix);
  };
  window.v34DriveUploadFile=v34DriveUploadFile;

  // Rebuild imageData/fileData with no dependency on missing old helper functions.
  if(typeof imageData==='function'){
    const localCompress = (typeof _v34LocalImageData==='function') ? _v34LocalImageData : null;
    imageData = async function(file,max=900){
      if(!file) return '';
      let dataUrl='';
      if(String(file.type||'').startsWith('image/') && localCompress){
        dataUrl=await localCompress(file,max);
      }else{
        dataUrl=await v43ReadFileDataUrl(file);
      }
      const up=await v34DriveUploadDataUrl(dataUrl,file,(typeof v34CurrentDriveFolder==='function'?v34CurrentDriveFolder():'09 General Uploads'),'vscore_image');
      return up.thumbnailUrl || up.directViewUrl || up.viewUrl || up.url || '';
    };
    window.imageData=imageData;
  }
  if(typeof fileData==='function'){
    fileData=async function(file,max=1200){
      if(!file) return '';
      if(String(file.type||'').startsWith('image/')) return imageData(file,max);
      const up=await v34DriveUploadFile(file,(typeof v34CurrentDriveFolder==='function'?v34CurrentDriveFolder():'09 General Uploads'),'vscore_attachment');
      return up.embedUrl || up.viewUrl || up.directViewUrl || up.url || '';
    };
    window.fileData=fileData;
  }

  // Strengthen upload image helper to use the fixed uploader and inline statuses.
  window.v40CompressedImageToDrive=async function(file,folder,prefix='image',max=900){
    if(!file) return {url:'',name:''};
    let dataUrl='';
    if(String(file.type||'').startsWith('image/') && typeof _v34LocalImageData==='function') dataUrl=await _v34LocalImageData(file,max);
    else dataUrl=await v43ReadFileDataUrl(file);
    const up=await v34DriveUploadDataUrl(dataUrl,file,folder,prefix);
    const url=up.thumbnailUrl||up.directViewUrl||up.viewUrl||up.url||'';
    return {url,name:file.name,driveFileId:up.fileId||'',storage:'company-drive'};
  };
  window.v40UploadImages=async function(input,max,folder,prefix='vscore_image'){
    const files=Array.from(input?.files||[]).slice(0,max);
    const arr=[];
    for(const f of files){
      const item=await window.v40CompressedImageToDrive(f,folder,prefix,900);
      if(item.url) arr.push({url:item.url,name:f.name,stamp:(typeof serverStamp==='function'?await serverStamp():new Date().toISOString()),storage:'company-drive'});
    }
    return arr;
  };

  window.addEventListener('error',function(ev){
    const msg=String(ev.message||'').toLowerCase();
    if(msg.includes('stripdataurl') || msg.includes('strip data url')){
      ev.preventDefault();
      if(typeof toast==='function') toast('Upload helper fixed in V43. Please retry the upload.','error');
    }
  });
})();
/* ================= END V43 INLINE THUMBNAIL UPLOAD FINAL FIX ================= */


/* ================= V44 NO DOUBLE UPLOAD + DRIVE DELETE POWER =================
   Fixes double Google Drive uploads caused by stacked submit handlers.
   Adds delete support: deleting a News Feed post can move attached Drive files to Trash.
   Keeps V43 thumbnail upload readiness UI.
*/
(function(){
  window.VSCORE_DRIVE_BRIDGE_URL = window.VSCORE_DRIVE_BRIDGE_URL || 'https://script.google.com/macros/s/AKfycbz3krYzflahEBoB_LIeEbP3gJ1TyOUJDa4GU7zepR8YQjT1NiI-S1N-MF4yVosm1KXByw/exec';
  window.VSCORE_DRIVE_UPLOAD_MAX_MB = window.VSCORE_DRIVE_UPLOAD_MAX_MB || 20;

  // 1) Single-flight cache: same selected file cannot be uploaded twice during one post/send.
  window.v44DriveUploadCache = window.v44DriveUploadCache || new Map();
  function v44UploadKey(dataUrl,file,folder,prefix){
    if(file) return [folder||'',prefix||'',file.name||'',file.size||0,file.lastModified||0].join('|');
    return [folder||'',prefix||'',String(dataUrl||'').slice(0,40),String(dataUrl||'').length].join('|');
  }

  if(typeof v34DriveUploadDataUrl==='function' && !window.__v44NoDoubleDriveUpload){
    window.__v44NoDoubleDriveUpload=true;
    const _v44BaseUpload=v34DriveUploadDataUrl;
    v34DriveUploadDataUrl=async function(dataUrl,file,folder,prefix='vscore'){
      const key=v44UploadKey(dataUrl,file,folder,prefix);
      if(window.v44DriveUploadCache.has(key)){
        if(typeof v43SetFileStatus==='function' && file) v43SetFileStatus(file,'uploading','Already uploading...');
        return await window.v44DriveUploadCache.get(key);
      }
      const p=Promise.resolve().then(()=>_v44BaseUpload.call(this,dataUrl,file,folder,prefix));
      window.v44DriveUploadCache.set(key,p);
      p.then(()=>setTimeout(()=>window.v44DriveUploadCache.delete(key),120000)).catch(()=>window.v44DriveUploadCache.delete(key));
      return await p;
    };
    window.v34DriveUploadDataUrl=v34DriveUploadDataUrl;
  }

  // 2) Capture News Feed submit once, before older stacked listeners can double-submit.
  if(!window.__v44NewsSubmitCapture){
    window.__v44NewsSubmitCapture=true;
    window.__v44PostingNews=false;
    document.addEventListener('submit',function(e){
      const form=e.target;
      if(!form || form.id!=='newsForm') return;
      e.preventDefault();
      e.stopImmediatePropagation();
      if(window.__v44PostingNews){
        if(typeof toast==='function') toast('Post is already uploading. Please wait until it finishes.','error');
        return false;
      }
      window.__v44PostingNews=true;
      const btn=e.submitter || form.querySelector('button[type="submit"],button');
      if(btn){btn.disabled=true;btn.dataset.v44Text=btn.textContent;btn.textContent='Uploading photos...';}
      Promise.resolve(createSocialPost(e,'news'))
        .catch(err=>{console.error(err); if(typeof toast==='function') toast(err.message||String(err),'error');})
        .finally(()=>{window.__v44PostingNews=false; if(btn){btn.disabled=false;btn.textContent=btn.dataset.v44Text||'Post to VARDA News Feed';}});
      return false;
    },true);
  }

  function v44Unique(arr){return Array.from(new Set((arr||[]).map(x=>String(x||'').trim()).filter(Boolean)));}
  function v44DriveIdFromUrl(url){
    const s=String(url||'');
    let m=s.match(/[?&]id=([a-zA-Z0-9_-]{20,})/); if(m) return m[1];
    m=s.match(/\/d\/([a-zA-Z0-9_-]{20,})/); if(m) return m[1];
    m=s.match(/thumbnail\?id=([a-zA-Z0-9_-]{20,})/); if(m) return m[1];
    return '';
  }
  window.v44DriveIdFromUrl=v44DriveIdFromUrl;

  function v44ExtractDriveIdsFromJson(v){
    const ids=[];
    let arr=[];
    try{arr=JSON.parse(v||'[]')}catch(e){arr=[];}
    if(!Array.isArray(arr)) arr=[arr];
    arr.forEach(item=>{
      if(!item) return;
      if(typeof item==='string') ids.push(v44DriveIdFromUrl(item));
      else{
        ids.push(item.driveFileId||item.fileId||'');
        ids.push(v44DriveIdFromUrl(item.url||item.viewUrl||item.directViewUrl||item.thumbnailUrl||item.embedUrl||''));
      }
    });
    return v44Unique(ids);
  }
  window.v44ExtractDriveIdsFromJson=v44ExtractDriveIdsFromJson;

  async function v44DriveDeleteFiles(fileIds,reason='delete'){
    const ids=v44Unique(fileIds);
    if(!ids.length) return {ok:true,deleted:[],failed:[]};
    if(typeof v36HiddenDriveFormPost!=='function'){
      return {ok:false,deleted:[],failed:ids.map(id=>({id,error:'Bridge command method missing'}))};
    }
    return await v36HiddenDriveFormPost({
      action:'deleteFiles',
      fileIds:JSON.stringify(ids),
      reason,
      deletedBy:window.S?.profile?.full_name||'',
      employeeId:window.S?.profile?.id||'',
      branch:window.S?.profile?.branch||'',
      app:'V-SCORE'
    },90000);
  }
  window.v44DriveDeleteFiles=v44DriveDeleteFiles;

  // 3) Override post delete to also move attached Drive files to Trash.
  if(typeof deletePost==='function' && !window.__v44DeletePostPatched){
    window.__v44DeletePostPatched=true;
    deletePost=async function(id,btn){
      const post=(S.newsPosts||[]).find(p=>String(p.id)===String(id))||{};
      const ids=v44ExtractDriveIdsFromJson(post.photos_json);
      const msg=ids.length ? `Delete this post and move ${ids.length} attached file(s) to company storage Trash?` : 'Delete this post?';
      if(!confirm(msg)) return;
      await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Delete Post',toast:'Post deleted.'},async()=>{
        const r=await sb.from('vscore_social_posts').update({is_active:false,deleted_by:S.profile.id,deleted_at:new Date().toISOString()}).eq('id',id);
        if(r.error) throw r.error;
        if(ids.length){
          try{
            const dr=await v44DriveDeleteFiles(ids,'news-post-delete');
            const failed=(dr.failed||[]).length;
            if(failed && typeof toast==='function') toast(`Post deleted. ${failed} Drive file(s) could not be moved to trash.`, 'error');
          }catch(err){
            console.warn('Drive delete warning:',err);
            if(typeof toast==='function') toast('Post deleted. Storage file delete will need manual checking.', 'error');
          }
        }
        try{await auditEvent('VARDA News Feed post deleted','vscore_social_posts',`${id} | drive files: ${ids.length}`)}catch(e){}
      },async()=>{await loadData();renderPage();});
    };
    window.deletePost=deletePost;
  }

  // 4) Improve button label so users know delete includes the file.
  if(typeof postCard==='function' && !window.__v44PostCardLabel){
    window.__v44PostCardLabel=true;
    const _v44PostCard=postCard;
    postCard=function(){
      let html=_v44PostCard.apply(this,arguments);
      return String(html).replace(/>Delete Post<\/button>/g,'>Delete Post & Files</button>');
    };
  }
})();
/* ================= END V44 NO DOUBLE UPLOAD + DRIVE DELETE POWER ================= */


/* ================= V45 GLOBAL DRIVE DELETE + CHAT ADMIN DELETE =================
   Extends Drive trash support beyond News Feed:
   - Chat message delete (own message or management/admin)
   - Memo attachments
   - Forms Library files
   - Reward images
   - FSQA evidence / rectification
   - Academy uploaded slide/image attachments (safe attempt only)
   - Cleanup expired feed/chat/tasklist tries to move Drive files to Trash first
   NOTE: If a file was only a manual external link, the app will attempt delete only when it can extract a Drive file ID.
*/
(function(){
  const warn=(...a)=>{try{console.warn('[V45]',...a)}catch(e){}};
  function v45uniq(arr){return [...new Set((arr||[]).map(String).map(s=>s.trim()).filter(Boolean))]}
  function v45DriveId(url){
    try{
      if(!url) return '';
      if(typeof v44DriveIdFromUrl==='function') return v44DriveIdFromUrl(url)||'';
      const s=String(url);
      let m=s.match(/\/d\/([a-zA-Z0-9_-]{15,})/); if(m) return m[1];
      m=s.match(/[?&]id=([a-zA-Z0-9_-]{15,})/); if(m) return m[1];
      m=s.match(/thumbnail\?id=([a-zA-Z0-9_-]{15,})/); if(m) return m[1];
      return '';
    }catch(e){return ''}
  }
  function v45extractAny(v){
    const ids=[];
    const add=x=>{const id=v45DriveId(x); if(id) ids.push(id)};
    try{
      if(!v) return [];
      if(typeof v44ExtractDriveIdsFromJson==='function') ids.push(...(v44ExtractDriveIdsFromJson(v)||[]));
      if(typeof v==='string'){
        add(v);
        const t=v.trim();
        if((t.startsWith('[')||t.startsWith('{'))){
          try{ids.push(...v45extractAny(JSON.parse(t)))}catch(e){}
        }
      }else if(Array.isArray(v)){
        v.forEach(x=>ids.push(...v45extractAny(x)));
      }else if(typeof v==='object'){
        ['url','viewUrl','directViewUrl','thumbnailUrl','embedUrl','file_url','attachment_url','image_url','media_json','photos_json','proof_url','evidence_url','rectification_url'].forEach(k=>ids.push(...v45extractAny(v[k])));
        if(v.driveFileId) ids.push(v.driveFileId);
        if(v.fileId) ids.push(v.fileId);
      }
    }catch(e){warn('extract failed',e)}
    return v45uniq(ids);
  }
  function v45idsFromRecord(rec,fields=[]){
    const ids=[]; fields.forEach(f=>ids.push(...v45extractAny(rec?.[f]))); return v45uniq(ids);
  }
  async function v45trash(ids,reason){
    ids=v45uniq(ids);
    if(!ids.length) return {ok:true,deleted:[],failed:[]};
    if(typeof v44DriveDeleteFiles==='function') return await v44DriveDeleteFiles(ids,reason);
    warn('Drive delete helper missing'); return {ok:false,deleted:[],failed:ids.map(id=>({id,error:'Drive delete helper missing'}))};
  }
  window.v45DriveId=v45DriveId;
  window.v45ExtractDriveIds=v45extractAny;
  window.v45TrashDriveFiles=v45trash;

  function v45label(ids,base){return ids.length?`${base} and move ${ids.length} attached file(s) to company storage Trash?`:base;}

  // Chat delete power: owner/management can delete any chat message; sender can delete own.
  window.deleteChatMessage=async function(mid,btn){
    const msg=(S.chatMessages||[]).find(m=>String(m.id)===String(mid));
    if(!msg) return toast('Message not found.','error');
    const allowed=(typeof isOwner==='function'&&isOwner())||(typeof isManager==='function'&&isManager())||String(msg.sender_id)===String(S.profile.id);
    if(!allowed) return toast('Only sender or authorized management can delete this message.','error');
    const ids=v45extractAny(msg.media_json);
    if(!confirm(v45label(ids,'Delete this chat message?'))) return;
    await act(btn||document.createElement('button'),{busy:'Deleting...',success:'Deleted',reset:'Delete',toast:'Chat message deleted.'},async()=>{
      if(ids.length){try{await v45trash(ids,'chat-message-delete')}catch(e){warn(e); toast('Message deleted. File trash needs manual check.','error')}}
      // Delete row when possible; fallback to inactive/blank if RLS/column policy blocks delete.
      let r=await sb.from('vscore_chat_messages').delete().eq('id',mid);
      if(r.error){
        r=await sb.from('vscore_chat_messages').update({is_active:false,message_text:'[deleted]',media_json:'[]',deleted_at:new Date().toISOString()}).eq('id',mid);
        if(r.error) throw r.error;
      }
      try{await auditEvent('Chat message deleted','vscore_chat_messages',`${mid} | drive files: ${ids.length}`)}catch(e){}
    },async()=>{await loadData(); if(document.getElementById('chatPanel')?.classList.contains('open'))renderChatBody();});
  };

  if(typeof chatMsgHtml==='function' && !window.__v45ChatDeletePatched){
    window.__v45ChatDeletePatched=true;
    const oldChatMsgHtml=chatMsgHtml;
    chatMsgHtml=function(m){
      let html=oldChatMsgHtml(m);
      const allowed=(typeof isOwner==='function'&&isOwner())||(typeof isManager==='function'&&isManager())||String(m.sender_id)===String(S.profile.id);
      if(!allowed) return html;
      const btn=` <button class="btn sm dark delChatMsg" data-id="${esc(m.id)}">Delete</button>`;
      return String(html).replace('</div>',`${btn}</div>`);
    };
  }
  if(typeof renderChatBody==='function' && !window.__v45ChatBindPatched){
    window.__v45ChatBindPatched=true;
    const oldRenderChatBody=renderChatBody;
    renderChatBody=function(){
      const out=oldRenderChatBody.apply(this,arguments);
      setTimeout(()=>{$$('.delChatMsg').forEach(b=>b.onclick=()=>deleteChatMessage(b.dataset.id,b));},30);
      return out;
    };
  }

  // Patch delete buttons in other modules to also trash uploaded Drive files.
  if(typeof deleteFormItem==='function' && !window.__v45DeleteFormPatched){
    window.__v45DeleteFormPatched=true;
    deleteFormItem=async function(id,btn){
      const rec=(S.forms||[]).find(x=>String(x.id)===String(id))||{};
      const ids=v45idsFromRecord(rec,['file_url','image_url','attachment_url']);
      if(!confirm(v45label(ids,'Delete/deactivate this form from staff library?'))) return;
      await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Deleted',toast:'Form deleted.'},async()=>{
        const r=await sb.from('vscore_forms').update({is_active:false,updated_by:S.profile.id,updated_at:new Date().toISOString()}).eq('id',id); if(r.error)throw r.error;
        if(ids.length) await v45trash(ids,'form-delete');
        await auditEvent('Form deleted','vscore_forms',`${id} | drive files: ${ids.length}`);
      },async()=>{await loadData();renderPage()});
    };
    window.deleteFormItem=deleteFormItem;
  }
  if(typeof deleteMemo==='function' && !window.__v45DeleteMemoPatched){
    window.__v45DeleteMemoPatched=true;
    deleteMemo=async function(id,btn){
      const rec=(S.memos||[]).find(x=>String(x.id)===String(id))||{};
      const ids=v45idsFromRecord(rec,['attachment_url','file_url','image_url']);
      if(!confirm(v45label(ids,'Delete this memo from active memo list?'))) return;
      await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Deleted',toast:'Memo deleted.'},async()=>{
        const r=await sb.from('memos').update({is_active:false,is_required:false}).eq('id',id); if(r.error)throw r.error;
        if(ids.length) await v45trash(ids,'memo-delete');
        try{await auditEvent('Memo deleted','memos',`${id} | drive files: ${ids.length}`)}catch(e){}
      },async()=>{await loadData();renderPage()});
    };
    window.deleteMemo=deleteMemo;
  }
  if(typeof deleteReward==='function' && !window.__v45DeleteRewardPatched){
    window.__v45DeleteRewardPatched=true;
    deleteReward=async function(id,btn){
      const rec=(S.rewards||[]).find(x=>String(x.id)===String(id))||{};
      const ids=v45idsFromRecord(rec,['image_url','file_url','attachment_url']);
      if(!confirm(v45label(ids,'Delete this reward item?'))) return;
      await act(btn,{busy:'Deleting...',success:'Deleted',reset:'Deleted',toast:'Reward deleted.'},async()=>{
        const r=await sb.from('vscore_rewards').update({is_active:false}).eq('id',id); if(r.error)throw r.error;
        if(ids.length) await v45trash(ids,'reward-delete');
        try{await auditEvent('Reward deleted','vscore_rewards',`${id} | drive files: ${ids.length}`)}catch(e){}
      },async()=>{await loadData();renderPage()});
    };
    window.deleteReward=deleteReward;
  }
  if(typeof deleteFsqa==='function' && !window.__v45DeleteFsqaPatched){
    window.__v45DeleteFsqaPatched=true;
    deleteFsqa=async function(id,btn){
      const rec=(S.fsqa||[]).find(x=>String(x.id)===String(id))||{};
      const ids=v45idsFromRecord(rec,['evidence_url','rectification_url','image_url','file_url']);
      if(!confirm(v45label(ids,'Remove this FSQA record from active monitoring?'))) return;
      await act(btn,{busy:'Removing...',success:'Removed',reset:'Removed',toast:'FSQA record removed.'},async()=>{
        const r=await sb.from('fsqa_audits').update({is_active:false}).eq('id',id); if(r.error)throw r.error;
        if(ids.length) await v45trash(ids,'fsqa-delete');
        await auditEvent('FSQA removed','fsqa_audits',`${id} | drive files: ${ids.length}`);
      },async()=>{await loadData();renderPage()});
    };
    window.deleteFsqa=deleteFsqa;
  }
  if(typeof deleteAcademyTraining==='function' && !window.__v45AcademyDeletePatched){
    window.__v45AcademyDeletePatched=true;
    deleteAcademyTraining=async function(mid,btn){
      const rec=(S.academyModules||[]).find(x=>String(x.id)===String(mid))||{};
      const slideIds=(S.academySlides||[]).filter(s=>String(s.module_id)===String(mid)).flatMap(s=>v45idsFromRecord(s,['image_url','file_url','attachment_url']));
      // Only uploaded slide/image attachments are included. Manual training links may be company master files, so deletion is a safe attempt only.
      const ids=v45uniq([...v45idsFromRecord(rec,['attachment_url','image_url','file_url','slides_json','slide_images_json']),...slideIds]);
      if(!confirm(v45label(ids,'Deactivate this Academy training?'))) return;
      await act(btn,{busy:'Deactivating...',success:'Deactivated',reset:'Deactivate',toast:'Training deactivated.'},async()=>{
        const r=await sb.from('vscore_academy_modules').update({is_active:false,updated_at:new Date().toISOString()}).eq('id',mid); if(r.error)throw r.error;
        if(ids.length) await v45trash(ids,'academy-training-delete');
        S.academyModules=(S.academyModules||[]).filter(m=>String(m.id)!==String(mid));
        try{await auditEvent('Academy training deactivated','vscore_academy_modules',`${mid} | drive files: ${ids.length}`)}catch(e){}
      },()=>renderPage());
    };
    window.deleteAcademyTraining=deleteAcademyTraining;
  }

  // Cleanup expired temporary data should also try to trash Drive images first.
  if(typeof cleanupExpired==='function' && !window.__v45CleanupPatched){

/* ================= V46 ALL MERIT / V-POINTS CELEBRATION FINAL =================
   Goal: Every positive V-Points gain creates the same Ka-Varda celebration flow.
   Covered: manual merit, achievement approval, mission approval, FSQA merit, training merit,
   reward-related merit, and any future feature that calls addPoints().
   Safety: demerits/negative points will NOT trigger celebration. Duplicate calls are deduped.
*/
(function(){
  const V46_VERSION='V46_ALL_MERIT_CELEBRATION_FINAL';
  window.VSCORE_VERSION=(window.VSCORE_VERSION||'')+' + '+V46_VERSION;

  function v46Key(employeeId,pts,sourceType,sourceId,reason){
    return [String(employeeId||''), String(Number(pts||0)), String(sourceType||'manual'), String(sourceId||reason||'')].join('|');
  }
  window.__v46CelebrationLocks=window.__v46CelebrationLocks||{};

  function v46ReasonLabel(reason,type){
    const r=String(reason||'V-Points merit').trim();
    const t=String(type||'manual').replace(/_/g,' ').toUpperCase();
    if(r) return r;
    return t ? `Approved merit from ${t}` : 'Approved V-Points merit';
  }

  // Add dedupe protection to the existing celebration creator, including old achievement/mission overrides.
  if(typeof createMeritCelebration==='function' && !window.__v46CreateMeritCelebrationPatched){
    window.__v46CreateMeritCelebrationPatched=true;
    const _v46BaseCreateMeritCelebration=createMeritCelebration;
    createMeritCelebration=async function(employeeId,pts,reason,sourceType,sourceId){
      const points=Number(pts||0);
      if(!employeeId || points<=0) return;
      const key=v46Key(employeeId,points,sourceType,sourceId,reason);
      if(window.__v46CelebrationLocks[key]) return;
      window.__v46CelebrationLocks[key]=Date.now();
      try{
        // Avoid duplicate notification if the same action already created it.
        try{
          if(sourceId!==null && sourceId!==undefined && sourceId!==''){
            const existing=await sb.from('vscore_notifications')
              .select('id')
              .eq('employee_id',employeeId)
              .eq('type','merit_approved')
              .eq('source_type',sourceType||'manual')
              .eq('source_id',sourceId)
              .limit(1);
            if(!existing.error && existing.data && existing.data.length) return;
          }
        }catch(e){console.warn('V46 duplicate check skipped',e)}
        return await _v46BaseCreateMeritCelebration(employeeId,points,v46ReasonLabel(reason,sourceType),sourceType||'manual',sourceId||null);
      }finally{
        setTimeout(()=>{delete window.__v46CelebrationLocks[key]},9000);
      }
    };
    window.createMeritCelebration=createMeritCelebration;
  }

  // Universal hook: anything that adds positive V-Points now triggers celebration.
  if(typeof addPoints==='function' && !window.__v46AddPointsPatched){
    window.__v46AddPointsPatched=true;
    const _v46BaseAddPoints=addPoints;
    addPoints=async function(id,pts,reason,type='manual',sid=null){
      const points=Number(pts||0);
      const result=await _v46BaseAddPoints(id,pts,reason,type,sid);
      if(points>0 && typeof createMeritCelebration==='function'){
        try{await createMeritCelebration(id,points,reason,type,sid)}catch(e){console.warn('V46 celebration skipped',e)}
      }
      return result;
    };
    window.addPoints=addPoints;
  }

  // Helper for manual posting/recognition buttons if any future feature credits points without addPoints.
  window.v46CelebratePointGain=async function(employeeId,points,reason,type='manual',sourceId=null){
    if(Number(points||0)>0 && typeof createMeritCelebration==='function'){
      return await createMeritCelebration(employeeId,Number(points||0),reason,type,sourceId);
    }
  };

  // Staff-side reminder: if there is an unseen merit notification, keep showing the premium popup.
  const _v46RenderPage=renderPage;
  renderPage=function(){
    _v46RenderPage();
    try{setTimeout(()=>{if(typeof showMeritCelebrations==='function')showMeritCelebrations()},650)}catch(e){}
  };
  window.renderPage=renderPage;

})();
/* ================= END V46 ALL MERIT / V-POINTS CELEBRATION FINAL ================= */

      : `<div class="field"><label>Share Scope</label><select id="newsScope"><option value="all">National / All Branches</option><option value="branch">Selected Branch Only</option></select></div><div class="field"><label>Branch</label>${typeof branchSelect==='function'?branchSelect('newsBranch',S.profile?.branch||''):''}</div>`;
    return `<div class="card"><div class="feed-toolbar"><div><h3 style="margin:0">VARDA News Feed</h3><p class="muted" style="margin:4px 0 0">Healthy Ka-Varda sharing: appreciation, communication, reports of good work, training wins, and positive pasikat. Posts/images auto-clean after 24 hours.</p><div class="v70-feed-meter">Today: ${used} / ${lim.feedLimit>=999?'∞':lim.feedLimit} posts used · ${esc70(lim.group)}</div></div><button id="toggleNewsPost" class="btn green">Add Post</button></div><div id="newsPostBox" class="feed-form-wrap"><hr>${blocked?`<div class="notice">You reached your daily News Feed limit (${lim.feedLimit} posts/day for ${esc70(lim.group)}). You can post again tomorrow.</div>`:`<form id="newsForm"><div class="grid two">${scopeFields}</div><div class="field"><label>Caption / Appreciation / Communication</label><textarea id="newsCaption" placeholder="Share a positive work update, task photo, appreciation, training win, or announcement..."></textarea></div><div class="field"><label>Photos (optional, max 10)</label><input id="newsPhotos" type="file" multiple accept="image/*" capture="environment" class="input"><p class="small muted">Images are compressed. Posts/images are temporary and hidden after 24 hours.</p></div>${manager70()?`<div class="field"><label>Comments</label><select id="newsCommentsOn"><option value="true">Comments ON</option><option value="false">Comments OFF for staff level</option></select></div>`:`<input id="newsCommentsOn" type="hidden" value="true">`}<button class="btn green full">Post to VARDA News Feed</button></form>`}</div></div><br>${posts.map(p=>postCard(p,'news')).join('')||'<div class="empty">No posts yet. Be the first to share a positive Varda update.</div>'}`;
  };

  window.createSocialPost=createSocialPost=async function(e,type='news'){
    e.preventDefault(); const b=e.submitter; const lim=roleLimits70();
    await act(b,{busy:'Posting...',success:'Posted ✓',reset:'Post Again',toast:'Posted to VARDA News Feed.'},async()=>{
      const used=feedPostCountToday70(); if(lim.feedLimit<999 && used>=lim.feedLimit)throw new Error(`Daily News Feed limit reached: ${lim.feedLimit} posts/day for ${lim.group}.`);
      const files=Array.from($70('#newsPhotos')?.files||[]).slice(0,10); const photos=[];
      for(const f of files)photos.push({url:await imageData(f,900),name:f.name});
      const caption=($70('#newsCaption')?.value||'').trim(); if(!caption&&!photos.length)throw new Error('Add a caption or at least one photo.');
      let scope=$70('#newsScope')?.value||'branch'; if(scope==='national')scope='all';
      const branch=scope==='branch'?($70('#newsBranch')?.value||S.profile?.branch||''):(S.profile?.branch||'');
      const comments=manager70()?($70('#newsCommentsOn')?.value!=='false'):true;
      const row={post_type:'news',caption,photos_json:JSON.stringify(photos),created_by:S.profile.id,branch,share_scope:scope,comments_enabled:comments,expires_at:new Date(Date.now()+86400000).toISOString(),is_active:true};
      const r=await sb.from('vscore_social_posts').insert(row); if(r.error)throw r.error; try{await auditEvent('VARDA News Feed post created','vscore_social_posts',caption.slice(0,80)||'photo post')}catch(_){ }
    },async()=>{await loadData();renderPage()});
  };

  function inject70(){
    try{
      addStyle70(); const page=$70('#page'); if(!page||!S?.profile)return;
      if(S.tab==='dashboard'&&!$70('#v70Culture',page))page.insertAdjacentHTML('afterbegin',pointCultureHtml70());
      if(S.tab==='general_control'&&!$70('#v70RoleLimits',page))page.insertAdjacentHTML('beforeend',roleLimitsPanel70());
    }catch(e){console.warn('V70 inject skipped',e)}
  }
  const oldRenderPage70=window.renderPage||renderPage;
  window.renderPage=renderPage=function(){const out=oldRenderPage70.apply(this,arguments); setTimeout(inject70,120); return out};

  function safeToast70(msg){
    try{addStyle70(); let t=$70('#v70SafeToast'); if(!t){document.body.insertAdjacentHTML('beforeend','<div id="v70SafeToast" class="v70-safe-toast"></div>'); t=$70('#v70SafeToast')} t.textContent=msg; t.classList.add('show'); clearTimeout(window.__v70SafeTimer); window.__v70SafeTimer=setTimeout(()=>t.classList.remove('show'),4500)}catch(_){}
  }
  window.addEventListener('error',ev=>{window.__v70ErrorCount++; console.warn('V70 launch guard caught:',ev.message); if(window.__v70ErrorCount<=3)safeToast70('Something did not load perfectly. Please refresh once. Your data is safe.');});
  window.addEventListener('unhandledrejection',ev=>{window.__v70ErrorCount++; console.warn('V70 launch guard caught promise:',ev.reason); if(window.__v70ErrorCount<=3)safeToast70('Saving/loading issue detected. Please retry. Your data is safe.');});
  document.addEventListener('DOMContentLoaded',()=>{addStyle70();setTimeout(inject70,900)});
  console.log('V70 launch point culture + role limits safe guard loaded');
})();
/* ================= END V70 ================= */



init();
</script></body></html>
